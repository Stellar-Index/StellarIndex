---
# Bootstrap the cluster. Runs ONLY on the first host in the
# postgres_cluster group (db-01 by convention).
#
# Two paths:
#   - patroni_bootstrap_method=initdb  → fresh DB; Patroni's
#     own bootstrap section in patroni.yml runs initdb.
#   - patroni_bootstrap_method=pgbackrest → DR rebuild; we
#     pre-restore the data dir from pgBackRest, then start
#     Patroni and it adopts the existing primary.

- name: detect existing data dir
  stat:
    path: "{{ patroni_data_dir }}/PG_VERSION"
  register: _pg_data_present

- block:
    # F-1282 (codex audit-2026-05-13): honor
    # `patroni_pgbackrest_restore_target` per the defaults /
    # README / design-note documented contract. Pre-wave-112
    # the command always used `--type=immediate` regardless of
    # the variable's value, so an operator setting
    # `time:2026-05-12T14:00:00Z` for a point-in-time recovery
    # silently got an immediate-consistent restore instead.
    #
    # Supported values:
    #   - `latest`     → pgbackrest --type=default
    #                    (apply all available WAL)
    #   - `time:<ts>`  → pgbackrest --type=time --target=<ts>
    #                    (point-in-time recovery)
    #   - `immediate`  → pgbackrest --type=immediate
    #                    (restore to first consistent point;
    #                    the pre-wave-112 behavior)
    - name: assert patroni_pgbackrest_restore_target shape
      assert:
        that:
          - patroni_pgbackrest_restore_target in ['latest', 'immediate']
            or patroni_pgbackrest_restore_target.startswith('time:')
        fail_msg: >-
          patroni_pgbackrest_restore_target must be "latest",
          "immediate", or "time:<RFC3339-timestamp>".
          Got "{{ patroni_pgbackrest_restore_target }}".
      when:
        - patroni_bootstrap_method == "pgbackrest"
        - not _pg_data_present.stat.exists

    - name: bootstrap via pgBackRest restore
      command: >
        pgbackrest --stanza={{ patroni_pgbackrest_stanza }}
        {%- if patroni_pgbackrest_restore_target == 'latest' %}
        --type=default
        {%- elif patroni_pgbackrest_restore_target == 'immediate' %}
        --type=immediate
        {%- else %}
        --type=time --target={{ patroni_pgbackrest_restore_target[5:] | quote }}
        {%- endif %}
        --target-action=promote
        --delta
        restore
      become: yes
      become_user: postgres
      when:
        - patroni_bootstrap_method == "pgbackrest"
        - not _pg_data_present.stat.exists

    - name: ensure restored data dir ownership
      file:
        path: "{{ patroni_data_dir }}"
        owner: postgres
        group: postgres
        state: directory
        recurse: yes
      when:
        - patroni_bootstrap_method == "pgbackrest"
  when:
    - patroni_bootstrap_method == "pgbackrest"

- name: start Patroni (fresh — initdb path)
  systemd:
    name: patroni
    state: started
  when:
    - patroni_bootstrap_method == "initdb"
    - not _pg_data_present.stat.exists

- name: start Patroni (restore path — adopts the restored primary)
  systemd:
    name: patroni
    state: started
  when:
    - patroni_bootstrap_method == "pgbackrest"

- name: start Patroni (idempotent — already-bootstrapped host)
  systemd:
    name: patroni
    state: started
  when:
    - _pg_data_present.stat.exists

- name: wait for Patroni REST API
  uri:
    url: "http://127.0.0.1:8008/cluster"
    status_code: 200
  register: _bootstrap_state
  retries: 30
  delay: 2
  until: _bootstrap_state.status == 200

- name: confirm primary elected
  command: >
    patronictl -c /etc/patroni/patroni.yml list
  register: _primary_check
  changed_when: false
