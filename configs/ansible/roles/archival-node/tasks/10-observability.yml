---
# node_exporter + stellar-core-prometheus-exporter. Ships metrics on
# :9100 and :9473 respectively; both bound to loopback and reachable
# only over the internal_cidrs (nftables enforces).

# F-1291 (codex audit-2026-05-13): same fail-fast checksum
# pattern as F-1280/F-1285. Pre-fix get_url had no checksum.
- name: assert node_exporter_release_sha256 is set
  ansible.builtin.assert:
    that:
      - node_exporter_release_sha256 is defined
      - node_exporter_release_sha256 | length == 64
    fail_msg: >-
      node_exporter_release_sha256 must be set in inventory.
      Get the SHA from the release page:
      https://github.com/prometheus/node_exporter/releases/tag/v{{ node_exporter_version }}

- name: Download node_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"
    checksum: "sha256:{{ node_exporter_release_sha256 }}"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "--wildcards"
      - "*/node_exporter"

- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/node_exporter
    create_home: false
    state: present

# Textfile-collector landing dir. cmd/ratesengine-sla-probe writes
# its prom file here; cmd/ratesengine-ops verify-archive +
# archive-completeness + supply-snapshot write here too. Without
# this dir + the matching --collector.textfile flag below, every
# alert in deploy/monitoring/rules/{sla-probe,archive-completeness,
# supply-snapshot,verify-archive}.yml is permanently silent —
# this is exactly what the 2026-05-12 audit's F-1219 + F-1221
# documented as the SLA-evidence-chain gap.
- name: Ensure node_exporter textfile-collector dir
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile_collector
    state: directory
    owner: ratesengine
    group: ratesengine
    mode: "0775"

# /etc/default/supply-snapshot — operator override that wires the
# textfile-collector path the supply-snapshot binary writes its
# success metric to. Without this, the binary runs successfully on
# its daily cadence but emits no metric, and
# `ratesengine_supply_snapshot_never_initialized` (alert in
# deploy/monitoring/rules/supply-snapshot.yml) fires permanently.
# The asset coverage limitation (only XLM today) is documented in
# the unit comments + tracked separately — this file just unblocks
# the SLA-evidence chain.
- name: Install /etc/default/supply-snapshot (textfile metric wiring)
  ansible.builtin.copy:
    dest: /etc/default/supply-snapshot
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 10-observability.yml).
      # Required for ratesengine_supply_snapshot_last_success_timestamp
      # to emit. Without TEXTFILE_OUTPUT, the unit succeeds but no
      # metric is written and the never-initialized alert fires.
      TEXTFILE_OUTPUT=/var/lib/node_exporter/textfile_collector/supply_snapshot.prom
  tags: [observability, supply-snapshot]

# /etc/default/sla-probe — operator override that:
#   1. Targets the local API binary (bypasses CF + Caddy edges).
#   2. Wires the textfile-collector output for the
#      ratesengine_sla_probe_unit_failed gauge — without this the
#      Prometheus alert can't read the verdict and stays stuck on
#      whatever the previous run wrote (or stuck firing if no run
#      ever wrote a value).
#   3. Loosens the availability target from 99.9% (default) to
#      99.0%. With 30s × 2-worker burst the probe collects ~430
#      samples per endpoint; a single transient failure (TCP
#      reset, packet drop) registers as 99.77% < 99.9% — false-
#      positive that fired the alert constantly. 99.0% tolerates
#      4 transient failures per probe burst, still tighter than
#      the published customer-facing SLA (99.5%).
- name: Install /etc/default/sla-probe (probe target + textfile wiring)
  ansible.builtin.copy:
    dest: /etc/default/sla-probe
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by ansible (archival-node role / 10-observability.yml).
      BASE_URL=http://127.0.0.1:3000/v1
      DURATION=30s
      CONCURRENCY=2
      TEXTFILE_OUTPUT=/var/lib/node_exporter/textfile_collector/sla_probe.prom
      EXTRA_FLAGS="-availability-target 99.0"
  tags: [observability, sla-probe]

- name: Enable sla-probe.timer (the GO probe; emits the textfile metric)
  ansible.builtin.systemd:
    name: sla-probe.timer
    enabled: true
    state: started
  tags: [observability, sla-probe]

- name: Install node_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter \
        --web.listen-address=0.0.0.0:{{ node_exporter_port }} \
        --collector.systemd \
        --collector.processes \
        --collector.textfile \
        --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable + start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true

# stellar-core-prometheus-exporter scrapes the primary stellar-core
# daemon's /info endpoint. Only install when we actually run the
# primary — captive-cores don't expose /info.
- name: Install stellar-core-prometheus-exporter apt package
  ansible.builtin.apt:
    name: stellar-core-prometheus-exporter
    state: present
  when: run_stellar_core | bool

- name: Ensure stellar-core-prometheus-exporter systemd drop-in dir
  ansible.builtin.file:
    path: /etc/systemd/system/stellar-core-prometheus-exporter.service.d
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: run_stellar_core | bool

- name: Install stellar-core-prometheus-exporter systemd override
  ansible.builtin.copy:
    dest: /etc/systemd/system/stellar-core-prometheus-exporter.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/stellar-core-prometheus-exporter --port {{ core_exporter_port }}
  when: run_stellar_core | bool
  notify:
    - Reload systemd
    - Restart core exporter

- name: Enable + start stellar-core-prometheus-exporter
  ansible.builtin.systemd:
    name: stellar-core-prometheus-exporter
    state: started
    enabled: true
  when: run_stellar_core | bool

