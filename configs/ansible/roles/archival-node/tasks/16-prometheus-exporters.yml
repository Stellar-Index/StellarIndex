---
# F-0152 (audit-2026-05-26): closes the cascade-blind deployment
# gap where `configs/prometheus/prometheus.r1.yml` has scrape jobs
# for redis_exporter / postgres_exporter / pgbackrest_exporter,
# but none of the three were ever installed on r1. The audit
# originally framed F-0045/F-0046/F-0047 as runtime crashes;
# reality is they never ran. Every alert family that consumes
# their metrics (cache.yml, storage.yml, pgbackrest.* in
# infra.yml) has been silently `absent_over_time` since the rule
# files landed — the F-0085 meta-alert that fires `up == 0` is
# the only thing that currently surfaces the gap.
#
# Three exporters wired here:
#   - Group A: redis_exporter via the Debian package
#     `prometheus-redis-exporter` (port 9121). Distinct from the
#     redis-sentinel role's tarball-based exporter — this is
#     archival-node's single-node `redis-server` shape, NOT the
#     Sentinel cluster.
#   - Group B: postgres_exporter via the Debian package
#     `prometheus-postgres-exporter` (port 9187), peer-auth on
#     the local socket as the `postgres` superuser. Requires
#     `GRANT pg_monitor TO postgres_exporter` if the operator
#     later switches to a non-superuser role — documented in
#     `docs/operations/r1-deployment-state.md`.
#   - Group C: pgbackrest_exporter — no Debian package; pinned
#     upstream release tarball from
#     https://github.com/woblerr/pgbackrest_exporter/releases
#     (port 9854). Same fail-fast checksum pattern as F-1280 /
#     F-1285 / F-1291 / F-1293 — operator must set
#     `pgbackrest_exporter_release_sha256` in inventory.
#
# Env-files containing DATA_SOURCE_NAME live at mode 0640 with
# group `prometheus` so the package-shipped systemd unit (which
# runs as `prometheus`) can read them but no other local user
# can. Matches the F-1295 posture used by the redis-sentinel
# role's secret env-file.

# ── Group A: redis_exporter (Debian package) ──────────────────
#
# Ubuntu ships `prometheus-redis-exporter` in the `universe`
# component on noble (24.04) and jammy (22.04). r1 is noble per
# `r1-deployment-state.md` § Hardware (Ubuntu 24.04.3 LTS). The
# `apt` module will surface a clear error if universe is not
# enabled — recovery is to add the component via
# `add-apt-repository universe` or via /etc/apt/sources.list.d/.

- name: Install prometheus-redis-exporter Debian package
  ansible.builtin.apt:
    name: prometheus-redis-exporter
    state: present
    update_cache: true
    cache_valid_time: 3600

# r1's redis-server has no AUTH set today (single-node, internal
# bind only). REDIS_ADDR points the exporter at the local
# loopback; the `prometheus-redis-exporter` Debian unit reads
# /etc/default/prometheus-redis-exporter via EnvironmentFile.
# Same 0640 root:prometheus posture as the postgres env-file
# below for consistency, even though this file holds no secret
# today — keeps the role hardened against a future op that adds
# REDIS_PASSWORD without remembering to tighten the mode.
- name: Template /etc/default/prometheus-redis-exporter
  ansible.builtin.copy:
    dest: /etc/default/prometheus-redis-exporter
    owner: root
    group: prometheus
    mode: "0640"
    content: |
      # Managed by ansible (archival-node role / 16-prometheus-exporters.yml).
      # Sourced via the Debian-shipped systemd unit's `EnvironmentFile=`.
      REDIS_ADDR=redis://localhost:6379
      # Listen on loopback only — nftables blocks external 9121
      # access regardless, but defence-in-depth.
      WEB_LISTEN_ADDRESS=127.0.0.1:9121

- name: Enable + start prometheus-redis-exporter
  ansible.builtin.systemd:
    name: prometheus-redis-exporter
    state: started
    enabled: true
    daemon_reload: true

# ── Group B: postgres_exporter (Debian package) ───────────────
#
# The Debian package ships its own `prometheus` system user and
# runs the exporter as that user. We auth against postgres on
# the local Unix socket via peer auth, which means the
# DATA_SOURCE_NAME is read from /etc/default/prometheus-postgres-exporter
# by the package's systemd unit. We connect as the exporter's OWN
# OS user (`prometheus`) via peer auth on the local socket to a
# same-named PG role holding pg_monitor — no password anywhere.
# `sslmode=disable` is required for Unix-socket connections.
#
# HISTORY (2026-07-05, the pg_up=0 blind spell): the previous
# `user=postgres` socket DSN could NEVER work — peer auth requires
# the OS user to match, and the unit runs as `prometheus`, not
# `postgres`. The exporter had ALSO kept a stale pre-rotation TCP
# DSN in-process for weeks (env-file edits don't apply until
# restart). Both failure modes are closed by the role task below +
# the restart handler.

- name: PG monitoring role for the exporter (peer-auth, pg_monitor)
  become: true
  become_user: postgres
  become_flags: ""
  ansible.builtin.command:
    cmd: psql -d stellarindex -c "DO $do$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'prometheus') THEN CREATE ROLE prometheus LOGIN; END IF; END $do$; GRANT pg_monitor TO prometheus;"
  register: pgrole
  changed_when: "'GRANT ROLE' in pgrole.stdout"
  failed_when: pgrole.rc != 0

- name: Install prometheus-postgres-exporter Debian package
  ansible.builtin.apt:
    name: prometheus-postgres-exporter
    state: present
    update_cache: true
    cache_valid_time: 3600

# Env-file is 0640 root:prometheus — DATA_SOURCE_NAME would
# leak a password if the operator switches off peer auth, so
# we treat the file as secret regardless of current contents
# (F-1295 posture).
- name: Template /etc/default/prometheus-postgres-exporter
  ansible.builtin.copy:
    dest: /etc/default/prometheus-postgres-exporter
    owner: root
    group: prometheus
    mode: "0640"
    content: |
      # Managed by ansible (archival-node role / 16-prometheus-exporters.yml).
      # Sourced via the Debian-shipped systemd unit's `EnvironmentFile=`.
      #
      # Peer auth on the local Unix socket as the exporter's own OS
      # user (`prometheus`), matched to a same-named pg_monitor role
      # (created by the role task above); no password anywhere.
      DATA_SOURCE_NAME="user=prometheus host=/var/run/postgresql dbname=stellarindex sslmode=disable"
      # Listen on loopback only — same defence-in-depth as redis_exporter.
      PG_EXPORTER_WEB_LISTEN_ADDRESS=127.0.0.1:9187
  notify: Restart prometheus-postgres-exporter

- name: Enable + start prometheus-postgres-exporter
  ansible.builtin.systemd:
    name: prometheus-postgres-exporter
    state: started
    enabled: true
    daemon_reload: true

# ── Group C: pgbackrest_exporter (upstream tarball) ───────────
#
# No Debian package exists. Pinned upstream release from
# https://github.com/woblerr/pgbackrest_exporter/releases.
# Same fail-fast checksum pattern as F-1280/F-1285/F-1291 +
# F-1293 — operator must set `pgbackrest_exporter_release_sha256`
# in inventory before running this group. The default version
# (`pgbackrest_exporter_version` in defaults/main.yml) is
# updated per release; the SHA must be re-pasted from the
# upstream releases page when the version bumps.

- name: assert pgbackrest_exporter_release_sha256 is set
  ansible.builtin.assert:
    that:
      - pgbackrest_exporter_release_sha256 is defined
      - pgbackrest_exporter_release_sha256 | length == 64
    fail_msg: >-
      pgbackrest_exporter_release_sha256 must be set in inventory.
      Pull the matching SHA from the release page:
      https://github.com/woblerr/pgbackrest_exporter/releases/tag/v{{ pgbackrest_exporter_version }}

- name: Ensure pgbackrest_exporter system user
  ansible.builtin.user:
    name: pgbackrest_exporter
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/pgbackrest_exporter
    create_home: false
    state: present

- name: Check installed pgbackrest_exporter version
  ansible.builtin.command: /usr/local/bin/pgbackrest_exporter --version
  register: pge_current
  changed_when: false
  failed_when: false
  check_mode: false

- name: Download pgbackrest_exporter release tarball
  # Skipped when the installed version already matches — the download
  # previously ran unconditionally (2026-07-03 drift audit), and the
  # URL pattern matched the 0.18-era naming; >=0.23 uses
  # name-version-os-arch with x86_64.
  when: pgbackrest_exporter_version not in ((pge_current.stdout | default('')) + (pge_current.stderr | default('')))
  ansible.builtin.get_url:
    url: "https://github.com/woblerr/pgbackrest_exporter/releases/download/v{{ pgbackrest_exporter_version }}/pgbackrest_exporter-{{ pgbackrest_exporter_version }}-linux-x86_64.tar.gz"
    dest: "/tmp/pgbackrest_exporter-{{ pgbackrest_exporter_version }}.tgz"
    checksum: "sha256:{{ pgbackrest_exporter_release_sha256 }}"
    mode: "0644"

- name: Extract pgbackrest_exporter tarball
  when: pgbackrest_exporter_version not in ((pge_current.stdout | default('')) + (pge_current.stderr | default('')))
  ansible.builtin.unarchive:
    src: "/tmp/pgbackrest_exporter-{{ pgbackrest_exporter_version }}.tgz"
    dest: /tmp/
    remote_src: true

- name: Install pgbackrest_exporter binary
  when: pgbackrest_exporter_version not in ((pge_current.stdout | default('')) + (pge_current.stderr | default('')))
  ansible.builtin.copy:
    src: "/tmp/pgbackrest_exporter-{{ pgbackrest_exporter_version }}-linux-x86_64/pgbackrest_exporter"
    dest: /usr/local/bin/pgbackrest_exporter
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Install pgbackrest_exporter systemd unit
  ansible.builtin.template:
    src: systemd/pgbackrest_exporter.service.j2
    dest: /etc/systemd/system/pgbackrest_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable + start pgbackrest_exporter
  ansible.builtin.systemd:
    name: pgbackrest_exporter
    state: started
    enabled: true
    daemon_reload: true
