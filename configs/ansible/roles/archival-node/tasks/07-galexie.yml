---
# Galexie: SDF doesn't publish prebuilt binaries or an apt package
# for this component, so we build from source using the Go toolchain.
# `go install` with a versioned module path downloads, compiles, and
# installs in one idempotent command. Binary lands in $GOPATH/bin;
# we symlink into /usr/local/bin for PATH discoverability.
#
# Pinned version lives in defaults/main.yml → VERSIONS.md.

- name: Install Go toolchain (build dependency for galexie)
  ansible.builtin.apt:
    name: golang-go
    state: present

- name: Check existing galexie version
  ansible.builtin.command: /usr/local/bin/galexie version
  register: galexie_current
  failed_when: false
  changed_when: false

- name: Read the installed-galexie tag stamp
  # The binary self-reports a pseudo-version (v0.0.0-<date>-<sha>), which
  # can never textually match the pinned tag — the old gate rebuilt on
  # every run (found on the 2026-07-03 full apply). The stamp records
  # which TAG produced /usr/local/bin/galexie.
  ansible.builtin.slurp:
    src: /usr/local/bin/.galexie.tag
  register: galexie_stamp
  failed_when: false

- name: Build galexie via `go install` at pinned tag
  # The module's main package lives at the root (main.go), so we
  # install the module itself — no /cmd/... subpath. Binary filename
  # derives from the module's last path component → "stellar-galexie".
  #
  # Go 1.25+ is required by galexie's go.mod; the toolchain line in
  # that file makes `go install` auto-download the right compiler
  # even if the system Go is older.
  #
  # GOPATH/GOCACHE pinned under /root to keep build artefacts off
  # the stellar-core data dataset. go install is idempotent — re-runs
  # with the same version tag are no-ops once the binary exists.
  #
  # F-1312 (codex audit-2026-05-13): NO `creates:` guard. The pre-
  # fix version had `creates: /root/go/bin/stellar-galexie` which
  # short-circuits the task once ANY binary exists at that path,
  # even when galexie_version has been bumped — meaning a version
  # bump in inventory would skip the rebuild and the copy task
  # below would install the STALE binary into /usr/local/bin. The
  # `when:` clause on this task already provides the version-gate
  # idempotency (skips when the installed version string matches
  # galexie_version); the `creates:` was a redundant + conflicting
  # second guard. `go install` is itself idempotent at the
  # module-cache layer, so re-runs at the same version tag are a
  # no-op even without `creates:`.
  ansible.builtin.command: >-
    go install github.com/stellar/stellar-galexie@{{ galexie_version }}
  environment:
    GOPATH:  /root/go
    GOCACHE: /root/.cache/go-build
  when: galexie_version != (galexie_stamp.content | default('') | b64decode | trim)
  register: galexie_build
  notify: Restart galexie

# Remove any stale symlink from a previous run-shape where we
# thought a symlink would work. A /usr/local/bin/galexie symlink
# into /root/go/bin/ is unusable by any non-root service account
# because /root is 0700 → exec → EACCES. A leftover symlink from
# an earlier apply would still point there, so we nuke whatever's
# at the dest before the copy lands a real file.
- name: Stat the installed galexie and the go-install artifact
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /usr/local/bin/galexie
    - /root/go/bin/stellar-galexie
  register: galexie_paths

- name: Remove any stale /usr/local/bin/galexie link
  # ONLY when it actually IS a symlink (2026-07-03 drift audit: state:
  # absent removes real files too — unconditional, this deleted the
  # REAL binary right before a copy whose source only exists after a
  # fresh `go install`, leaving the host with no galexie at all).
  when: galexie_paths.results[0].stat.islnk | default(false)
  ansible.builtin.file:
    path: /usr/local/bin/galexie
    state: absent

- name: Install galexie binary into /usr/local/bin
  # Skipped when there is no fresh go-install artifact — on a built
  # host at the pinned version the binary is already in place.
  when: galexie_paths.results[1].stat.exists
  # Upstream calls the binary stellar-galexie; we rename so systemd
  # units can reference /usr/local/bin/galexie consistently. `copy`
  # is content-hash idempotent — runs every time but only actually
  # touches the file when the source (from go install) has changed.
  ansible.builtin.copy:
    src: /root/go/bin/stellar-galexie
    dest: /usr/local/bin/galexie
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: Restart galexie

- name: Stamp the installed galexie tag
  when: galexie_paths.results[1].stat.exists
  ansible.builtin.copy:
    dest: /usr/local/bin/.galexie.tag
    content: "{{ galexie_version }}"
    mode: "0644"

# Drift guard (docs/operations/runbooks/stellar-stack-version-lag.md).
# Reads the ACTUAL RUNTIME OUTPUT of the installed binary — the same
# ground truth stellar-stack-version-probe.sh reads — rather than
# trusting the .galexie.tag stamp file above, which a hand-installed
# swap (bypassing ansible entirely, as happened 2026-07-09 fixing the
# CAP-0071 crash-loop) would never update. Runs unconditionally
# (not gated on the `when:` above) so it catches drift on every
# apply, not just ones that also rebuilt galexie.
- name: Check installed galexie version string (drift guard)
  ansible.builtin.command: /usr/local/bin/galexie version
  register: galexie_running_version
  changed_when: false
  failed_when: false

- name: Assert galexie matches the ansible-pinned installed-version stamp
  # A hard assert, not a warning: ansible-drift.yml's entire purpose is
  # to fail loudly on exactly this class of drift (CLAUDE.md "r1
  # configuration is ansible-managed — codify every host change"). If
  # this fires because of a DELIBERATE upgrade, update
  # galexie_expected_version_string (and galexie_version, and
  # VERSIONS.md) in the SAME PR that performed it — see the
  # coordinated-upgrade checklist in the runbook. If it fires
  # unexpectedly, someone hand-swapped the binary without codifying it.
  #
  # NOTE for a from-scratch bootstrap (new region, or a full r1
  # rebuild): the `go install ...@{{ galexie_version }}` task above
  # builds whatever `galexie_version` currently points at. If that
  # tag has fallen behind `galexie_expected_version_string` (as it
  # does today — `galexie_version` is still pinned at galexie-v26.0.0,
  # predating the P27 upgrade), this assert will correctly fail on
  # that fresh build too: it's flagging the SAME staleness this whole
  # probe exists to catch, just discovered a different way. Fix by
  # bumping `galexie_version` to a tag whose build matches (or by
  # re-deriving `galexie_expected_version_string` from a fresh build
  # at the tag you actually want), not by disabling the assert.
  ansible.builtin.assert:
    that:
      - galexie_running_version.stdout is defined
      - (galexie_running_version.stdout | trim) == galexie_expected_version_string
    fail_msg: >-
      installed galexie reports
      '{{ galexie_running_version.stdout | default("<command failed: " ~ (galexie_running_version.stderr | default("no such file")) ~ ">") }}'
      but the ansible-pinned expected stamp (galexie_expected_version_string,
      defaults/main.yml) is '{{ galexie_expected_version_string }}'. See
      docs/operations/runbooks/stellar-stack-version-lag.md.
    success_msg: "installed galexie matches the pinned version stamp."
  tags: [observability, stellar-stack-version, drift-guard]

# Optional belt-and-suspenders: file-hash check, skipped entirely
# while galexie_expected_binary_sha256 is unset (see the comment on
# that var in defaults/main.yml for why it isn't pre-filled).
- name: Stat the installed galexie binary (drift guard checksum)
  when: galexie_expected_binary_sha256 is defined
  ansible.builtin.stat:
    path: /usr/local/bin/galexie
    checksum_algorithm: sha256
  register: galexie_binary_stat
  tags: [observability, stellar-stack-version, drift-guard]

- name: Assert galexie binary sha256 matches the pinned drift-guard checksum
  when: galexie_expected_binary_sha256 is defined
  ansible.builtin.assert:
    that:
      - galexie_binary_stat.stat.exists
      - galexie_binary_stat.stat.checksum == galexie_expected_binary_sha256
    fail_msg: >-
      /usr/local/bin/galexie's sha256
      ({{ galexie_binary_stat.stat.checksum | default('MISSING') }}) does not
      match the pinned galexie_expected_binary_sha256 — the binary was
      replaced without codifying it. See
      docs/operations/runbooks/stellar-stack-version-lag.md.
    success_msg: "installed galexie binary matches the pinned sha256."
  tags: [observability, stellar-stack-version, drift-guard]

- name: Ensure /etc/galexie exists
  ansible.builtin.file:
    path: /etc/galexie
    state: directory
    owner: galexie
    group: galexie
    mode: "0750"

- name: Ensure /var/lib/galexie/captive exists for embedded core
  # Matches captive_core.storage_path in galexie.toml. Not
  # auto-created by Galexie; it expects the dir to be writable.
  ansible.builtin.file:
    path: /var/lib/galexie/captive
    state: directory
    owner: galexie
    group: galexie
    mode: "0750"

- name: Install jq (galexie wrapper parses stellar-core /info JSON)
  ansible.builtin.apt:
    name: jq
    state: present

- name: Install galexie-append wrapper script
  # Galexie's append subcommand requires --start <ledger>. The wrapper
  # discovers the current tip from stellar-core at service-start time.
  # Also corrects the flag name: stellar-galexie uses --config-file
  # (not --config as upstream docs sometimes show).
  ansible.builtin.copy:
    src: galexie-append.sh
    dest: /usr/local/bin/galexie-append.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart galexie

- name: Install galexie-backfill-status TUI
  # Operator-only status snapshot. Combines scan-and-fill phase
  # detection, mc mirror progress, bucket counts, host load, and
  # process state. Run via `watch -n 5 galexie-backfill-status`.
  # See docs/operations/galexie-backfill.md.
  ansible.builtin.copy:
    src: galexie-backfill-status.sh
    dest: /usr/local/bin/galexie-backfill-status
    owner: root
    group: root
    mode: "0755"

- name: Install galexie-archive-fill recovery script
  # Per-partition mirror that handles mtime-poisoned buckets where
  # bucket-level `mc mirror` deadlocks. Audits local partitions,
  # deletes any partials, then mirrors only missing/just-deleted
  # partitions in parallel. See "mc mirror gotcha" in
  # docs/operations/galexie-backfill.md.
  ansible.builtin.copy:
    src: galexie-archive-fill.sh
    dest: /usr/local/bin/galexie-archive-fill
    owner: root
    group: root
    mode: "0755"

- name: Install galexie-archive-tip-lag metric updater (#31)
  # Defense-in-depth for #26 — writes a Prometheus textfile gauge of
  # the ledger lag between galexie-live and galexie-archive. The
  # accompanying alert pages within hours if the hourly catch-up
  # timer silently breaks (the failure class that caused the 23-day
  # original incident).
  ansible.builtin.copy:
    src: galexie-archive-tip-lag.sh
    dest: /usr/local/bin/galexie-archive-tip-lag
    owner: root
    group: root
    mode: "0755"

- name: Template galexie-specific captive-core.cfg
  # The live-tail galexie needs its OWN captive config because the
  # PEER_PORT must differ from the backfill galexie's captive
  # (otherwise both captive-cores race to bind the same port and
  # whichever comes second aborts). Same validator list / history
  # archives as the backfill captive — only PEER_PORT differs (and
  # the backfill cfg additionally carries [HISTORY.localmirror]).
  ansible.builtin.template:
    src: stellar-core.cfg.j2
    dest: /etc/stellar/captive-core-galexie.cfg
    owner: stellar
    group: galexie
    mode: "0640"
  vars:
    cfg_mode: captive
    captive_peer_port: "{{ captive_peer_port_galexie }}"
  notify: Restart galexie

- name: Template galexie.toml
  ansible.builtin.template:
    src: galexie.toml.j2
    dest: /etc/galexie/galexie.toml
    owner: galexie
    group: galexie
    mode: "0640"
  notify: Restart galexie

- name: Template backfill captive-core.cfg
  # The archive-backfill galexie runs a SECOND captive-core. Its
  # PEER_PORT (11727) must differ from the live captive's (11726)
  # so both can bind, and it carries a [HISTORY.localmirror] block
  # so historical replay reads checkpoints from the local
  # /srv/history-archive mirror instead of downloading them. Same
  # validator list / quorum as the live captive — only PEER_PORT +
  # the localmirror block differ.
  ansible.builtin.template:
    src: stellar-core.cfg.j2
    dest: /etc/stellar/captive-core-galexie-backfill.cfg
    owner: stellar
    group: galexie
    mode: "0640"
  vars:
    cfg_mode: captive
    captive_peer_port: "{{ captive_peer_port_backfill }}"
    captive_history_localmirror: true

- name: Template galexie-backfill.toml
  # Config for the on-demand archive-backfill galexie process —
  # writes historical ranges into the galexie-archive bucket.
  # Not a systemd-managed daemon; an operator runs it for a
  # bounded ledger range during a backfill.
  ansible.builtin.template:
    src: galexie-backfill.toml.j2
    dest: /etc/galexie/galexie-backfill.toml
    owner: galexie
    group: galexie
    mode: "0640"

- name: Template /etc/default/galexie-backfill (S3 creds for archive writer)
  # Env file for the archive-backfill galexie. The galexie-archive
  # bucket has its own bucket-scoped MinIO writer user, distinct
  # from the galexie-live writer in /etc/default/galexie. Galexie's
  # S3 client reads the AWS_* env vars; secrets come from the vault.
  ansible.builtin.copy:
    dest: /etc/default/galexie-backfill
    owner: root
    group: galexie
    mode: "0640"
    content: |
      # Rendered by Ansible. Do not edit by hand — regenerate via
      # `ansible-playbook ... --tags galexie`.
      AWS_ACCESS_KEY_ID={{ galexie_archive_s3_access_key }}
      AWS_SECRET_ACCESS_KEY={{ galexie_archive_s3_secret_key }}
      AWS_REGION={{ galexie_s3_region }}
      AWS_ENDPOINT_URL={{ galexie_s3_endpoint }}
  no_log: true

- name: Template /etc/default/galexie (S3 credentials for captive-core export)
  # The systemd unit sources this file via EnvironmentFile. Galexie's
  # S3 client reads AWS_* env vars; we populate them from the vault-
  # decrypted galexie_s3_access_key / _secret_key. Mode 0640 so only
  # galexie group can read.
  ansible.builtin.copy:
    dest: /etc/default/galexie
    owner: root
    group: galexie
    mode: "0640"
    content: |
      # Rendered by Ansible. Do not edit by hand — regenerate via
      # `ansible-playbook ... --tags galexie`.
      AWS_ACCESS_KEY_ID={{ galexie_s3_access_key }}
      AWS_SECRET_ACCESS_KEY={{ galexie_s3_secret_key }}
      AWS_REGION={{ galexie_s3_region }}
      AWS_ENDPOINT_URL={{ galexie_s3_endpoint }}
  no_log: true
  notify: Restart galexie

- name: Install galexie systemd unit
  ansible.builtin.template:
    src: systemd/galexie.service.j2
    dest: /etc/systemd/system/galexie.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart galexie

- name: Enable + start galexie
  ansible.builtin.systemd:
    name: galexie
    state: started
    enabled: true
    daemon_reload: true

# #26 standing fix: schedule the hardened galexie-archive-fill so the
# durable full-mirror (ADR-0016) can never silently fall ~23 days
# behind again. The script already existed and was installed; it was
# only ever run by hand. Hourly timer → a stall is repaired within
# ~1h instead of going unnoticed for weeks.
- name: Install galexie-archive-fill systemd service + timer
  ansible.builtin.template:
    src: "systemd/{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - galexie-archive-fill.service
    - galexie-archive-fill.timer
  notify: Reload systemd

- name: Enable + start galexie-archive-fill.timer
  ansible.builtin.systemd:
    name: galexie-archive-fill.timer
    state: started
    enabled: true
    daemon_reload: true

# #31 defense-in-depth: tip-lag textfile metric + alert. Pages
# within hours if the #26 hourly catch-up timer silently breaks.
- name: Install galexie-archive-tip-lag systemd service + timer
  ansible.builtin.template:
    src: "systemd/{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - galexie-archive-tip-lag.service
    - galexie-archive-tip-lag.timer
  notify: Reload systemd

- name: Enable + start galexie-archive-tip-lag.timer
  ansible.builtin.systemd:
    name: galexie-archive-tip-lag.timer
    state: started
    enabled: true
    daemon_reload: true
