---
# Single-node MinIO so Galexie has an S3-compatible target locally.
# Production HA MinIO (9-node EC) is a later concern — tracked against
# the HA plan. See TODO(#0).

# F-1291 (codex audit-2026-05-13): fail fast if the operator
# hasn't supplied the MinIO release SHA256. Pre-fix the get_url
# had no `checksum:` — root-owned executable installed without
# provenance. Same fail-fast pattern as F-1280/F-1285.
- name: assert minio_release_sha256 is set
  ansible.builtin.assert:
    that:
      - minio_release_sha256 is defined
      - minio_release_sha256 | length == 64
    fail_msg: >-
      minio_release_sha256 must be set in inventory (SHA-256 of
      the MinIO server binary for `minio_version`). MinIO
      publishes a `.sha256sum` next to every release artefact at
      https://dl.min.io/server/minio/release/linux-amd64/archive/minio.{{ minio_version }}.sha256sum

- name: Download MinIO server binary (pinned version)
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/archive/minio.{{ minio_version }}"
    dest: /usr/local/bin/minio
    mode: "0755"
    owner: root
    group: root
    checksum: "sha256:{{ minio_release_sha256 }}"

- name: Template MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    owner: root
    group: minio
    mode: "0640"
  notify: Restart minio

- name: Install MinIO systemd unit
  ansible.builtin.template:
    src: systemd/minio.service.j2
    dest: /etc/systemd/system/minio.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart minio

- name: Enable + start MinIO
  ansible.builtin.systemd:
    name: minio
    state: started
    enabled: true
    daemon_reload: true

# ──── Bucket creation ─────────────────────────────────────────────
# Bootstrap the buckets galexie + pgBackRest + ad-hoc backups need.
# `mc` is MinIO's CLI; we install the standalone binary (not the
# apt package — there isn't one in stable at time of writing).
# Both `mc alias set` and `mc mb -p` are idempotent so this re-runs
# safely.

# F-1291 (codex audit-2026-05-13): pre-fix mc was downloaded
# from the MUTABLE `linux-amd64/mc` URL (no version pin) with no
# checksum. That's strictly worse than the server-binary case —
# the URL itself rolls to whatever upstream's "latest" is. Pin
# both `mc_version` AND the SHA via the
# `linux-amd64/archive/mc.RELEASE.<date>` archive form.
- name: assert mc_release_sha256 is set
  ansible.builtin.assert:
    that:
      - mc_release_sha256 is defined
      - mc_release_sha256 | length == 64
      - mc_version is defined
      - mc_version != ''
    fail_msg: >-
      mc_version + mc_release_sha256 must be set in inventory.
      Pick a release from https://github.com/minio/mc/releases —
      `mc_version` is the `RELEASE.<date>T<time>Z` slug, and
      mc_release_sha256 is alongside the release tarball.

- name: Install mc (MinIO CLI) for bucket bootstrap + operator use
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-amd64/archive/mc.{{ mc_version }}"
    dest: /usr/local/bin/mc
    mode: "0755"
    owner: root
    group: root
    checksum: "sha256:{{ mc_release_sha256 }}"

- name: Wait for MinIO API to be reachable on :9000
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/minio/health/live"
    status_code: 200
  retries: 15
  delay: 2
  register: minio_live
  until: minio_live.status == 200

- name: Configure mc alias for local MinIO
  # Env vars carry the credentials so they never land on argv (which
  # shows up in ps + journald). no_log prevents Ansible from
  # echoing them to stdout on failure.
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - alias
      - set
      - local
      - "http://127.0.0.1:9000"
      - "{{ minio_root_user }}"
      - "{{ minio_root_password }}"
  changed_when: false
  no_log: true

- name: Ensure required MinIO buckets exist
  ansible.builtin.command: "/usr/local/bin/mc mb --ignore-existing local/{{ item }}"
  loop:
    - galexie-live       # galexie's continuous ledger-meta export target
    - galexie-archive    # mirror of SDF's history archive (phase 2)
    - backups            # pgBackRest WAL + rdb dumps (phase 2)
  register: mc_mb
  changed_when: "'Bucket created successfully' in mc_mb.stdout"

# ──── Least-privilege user for galexie ────────────────────────────
# galexie had been using MinIO root creds. Task #156 scoped it to
# its own user with a bucket-restricted policy — can write to
# galexie-live only, not backups or galexie-archive.

- name: Render galexie-writer MinIO policy
  ansible.builtin.copy:
    dest: /etc/minio/policies/galexie-writer.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Action": [
              "s3:PutObject",
              "s3:GetObject",
              "s3:ListBucket",
              "s3:GetBucketLocation",
              "s3:ListBucketMultipartUploads",
              "s3:ListMultipartUploadParts",
              "s3:AbortMultipartUpload"
            ],
            "Resource": [
              "arn:aws:s3:::{{ galexie_s3_bucket }}",
              "arn:aws:s3:::{{ galexie_s3_bucket }}/*"
            ]
          }
        ]
      }
  register: galexie_policy_file

- name: Ensure /etc/minio/policies directory exists
  ansible.builtin.file:
    path: /etc/minio/policies
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install / update galexie-writer MinIO policy
  # `mc admin policy create` is idempotent when the policy exists —
  # pass the same JSON and it's a no-op. If JSON changed it updates.
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - admin
      - policy
      - create
      - local
      - galexie-writer
      - /etc/minio/policies/galexie-writer.json
  changed_when: false

- name: Create galexie-writer MinIO user (vault-supplied creds)
  # `mc admin user add` updates the secret if the user already exists.
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - admin
      - user
      - add
      - local
      - "{{ galexie_s3_access_key }}"
      - "{{ galexie_s3_secret_key }}"
  changed_when: false
  no_log: true

- name: Attach galexie-writer policy to galexie-writer user
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - admin
      - policy
      - attach
      - local
      - galexie-writer
      - --user
      - "{{ galexie_s3_access_key }}"
  changed_when: false
  failed_when: false   # mc returns non-zero if policy already attached

# ──── stellaratlas-reader (read-only on both buckets) ──────────────
# Used by stellaratlas-ops verify-archive today, and by the indexer +
# api once they have systemd units. Scoped to BOTH galexie-live and
# galexie-archive because the indexer stitches across them at the
# seam. NOT a writer — galexie-writer / galexie-archive-writer cover
# the write paths separately.

- name: Render stellaratlas-reader MinIO policy
  ansible.builtin.copy:
    dest: /etc/minio/policies/stellaratlas-reader.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Action": [
              "s3:GetObject",
              "s3:ListBucket",
              "s3:GetBucketLocation",
              "s3:ListBucketMultipartUploads",
              "s3:ListMultipartUploadParts"
            ],
            "Resource": [
              "arn:aws:s3:::galexie-live",
              "arn:aws:s3:::galexie-live/*",
              "arn:aws:s3:::galexie-archive",
              "arn:aws:s3:::galexie-archive/*"
            ]
          }
        ]
      }

- name: Install / update stellaratlas-reader MinIO policy
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - admin
      - policy
      - create
      - local
      - stellaratlas-reader
      - /etc/minio/policies/stellaratlas-reader.json
  changed_when: false

- name: Create stellaratlas-reader MinIO user (vault-supplied creds)
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - admin
      - user
      - add
      - local
      - "{{ stellaratlas_reader_access_key }}"
      - "{{ stellaratlas_reader_secret_key }}"
  changed_when: false
  no_log: true

- name: Attach stellaratlas-reader policy to stellaratlas-reader user
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - admin
      - policy
      - attach
      - local
      - stellaratlas-reader
      - --user
      - "{{ stellaratlas_reader_access_key }}"
  changed_when: false
  failed_when: false   # mc returns non-zero if policy already attached

- name: Template /etc/default/stellaratlas-ops (env vars for verify-archive + indexer/api)
  # Sourced both by interactive `stellaratlas-ops` invocations and
  # by the stellaratlas-indexer.service systemd unit (07-galexie /
  # stellaratlas-indexer task wires EnvironmentFile to this file).
  #
  # The AWS SDK that powers the datastore reader (verify-archive +
  # indexer ledgerstream) reads creds from AWS_ACCESS_KEY_ID /
  # AWS_SECRET_ACCESS_KEY. The STELLARATLAS_S3_* duplicates are for
  # config-load.go's ApplyEnvOverrides path. STELLARATLAS_POSTGRES_DSN
  # carries the application-db password so the file-on-disk
  # /etc/stellaratlas.toml stays password-free.
  #
  # Mode 0640 + group root for now; tighten to a `stellaratlas`
  # service group once the indexer/api have a dedicated user.
  ansible.builtin.copy:
    dest: /etc/default/stellaratlas-ops
    owner: root
    group: root
    mode: "0640"
    content: |
      # Rendered by Ansible. Do not edit by hand — regenerate via
      # `ansible-playbook ... --tags minio`.
      #
      # Source manually for interactive use:
      #   set -a; source /etc/default/stellaratlas-ops; set +a
      #   stellaratlas-ops verify-archive -config /etc/stellaratlas.toml ...
      AWS_ACCESS_KEY_ID={{ stellaratlas_reader_access_key }}
      AWS_SECRET_ACCESS_KEY={{ stellaratlas_reader_secret_key }}
      STELLARATLAS_S3_ACCESS_KEY={{ stellaratlas_reader_access_key }}
      STELLARATLAS_S3_SECRET_KEY={{ stellaratlas_reader_secret_key }}
      STELLARATLAS_POSTGRES_DSN=postgres://{{ postgres_user_stellaratlas }}:{{ postgres_pass_stellaratlas }}@127.0.0.1:5432/{{ postgres_db_stellaratlas }}?sslmode=disable
  no_log: true
