---
# Wire redis_exporter for Prometheus parity with the rest of the
# stack, plus a Sentinel-state textfile scraper for cluster-level
# (who-is-primary) metrics that redis_exporter doesn't expose.

- name: ensure node_exporter textfile dir
  file:
    path: "{{ redis_node_exporter_textfile_dir }}"
    state: directory
    owner: "{{ redis_user }}"
    group: "{{ redis_group }}"
    mode: "0755"

# ── redis_exporter ───────────────────────────────────────────────
# F-1293 (codex audit-2026-05-13): same fail-fast checksum
# pattern as F-1280/F-1285/F-1291. Pre-fix get_url had no
# `checksum:` — root-owned executable installed without
# provenance.
- name: assert redis_exporter_release_sha256 is set
  assert:
    that:
      - redis_exporter_release_sha256 is defined
      - redis_exporter_release_sha256 | length == 64
    fail_msg: >-
      redis_exporter_release_sha256 must be set in inventory.
      Get the SHA from the release page:
      https://github.com/oliver006/redis_exporter/releases/tag/{{ redis_exporter_version }}
  when: redis_exporter_version | length > 0

- name: download redis_exporter
  get_url:
    url: >-
      https://github.com/oliver006/redis_exporter/releases/download/{{
      redis_exporter_version }}/redis_exporter-{{ redis_exporter_version
      }}.linux-amd64.tar.gz
    dest: /tmp/redis_exporter.tar.gz
    mode: "0644"
    checksum: "sha256:{{ redis_exporter_release_sha256 }}"
  when: redis_exporter_version | length > 0

- name: extract redis_exporter
  unarchive:
    src: /tmp/redis_exporter.tar.gz
    dest: /tmp/
    remote_src: yes
  when: redis_exporter_version | length > 0

- name: install redis_exporter binary
  copy:
    src: "/tmp/redis_exporter-{{ redis_exporter_version }}.linux-amd64/redis_exporter"
    dest: /usr/local/bin/redis_exporter
    mode: "0755"
    remote_src: yes
  when: redis_exporter_version | length > 0

# F-1295 (codex audit-2026-05-13): write the Redis password to a
# 0600 root-only secret file, then have the systemd unit read it
# via `EnvironmentFile=`. Pre-fix the password was inlined into
# the world-readable (0644) unit file, so any local user could
# recover it via `cat /etc/systemd/system/redis_exporter.service`.
- name: install redis_exporter secret file
  copy:
    dest: /etc/default/redis_exporter
    owner: root
    group: root
    mode: "0600"
    content: |
      # F-1295: secret env-file for redis_exporter. 0600 root-only.
      # Sourced via the systemd unit's `EnvironmentFile=`.
      REDIS_PASSWORD={{ redis_password }}
  no_log: true
  when: redis_exporter_version | length > 0

- name: install redis_exporter systemd unit
  copy:
    dest: /etc/systemd/system/redis_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Redis Exporter (Prometheus)
      After=network-online.target redis-server.service
      [Service]
      Type=simple
      User={{ redis_user }}
      # F-1295 (codex audit-2026-05-13): REDIS_PASSWORD now comes
      # from the 0600 /etc/default/redis_exporter env-file (root-
      # only readable). Pre-fix the password was inlined here
      # via `Environment=REDIS_PASSWORD={{ redis_password }}` —
      # the unit file is 0644 so any local user could recover the
      # password.
      EnvironmentFile=/etc/default/redis_exporter
      {# F-1272 (codex audit-2026-05-13): the exporter user is #}
      {# only meaningful under ACL lockdown — `users.acl.j2` is #}
      {# only rendered when `redis_acl_lockdown` is true. With #}
      {# lockdown off, the legacy `default` user is `on nopass #}
      {# ~* &* +@all` and the legacy single-arg AUTH path works. #}
      {# With lockdown on, the dedicated `redis_exporter` ACL #}
      {# user (defined in users.acl.j2) gates INFO/CLIENT/ #}
      {# CLUSTER/CONFIG-GET/DBSIZE/SLOWLOG-GET — the commands #}
      {# the exporter needs but that the `ratesengine` #}
      {# application user denies via `-@admin -@dangerous`. #}
      {# Same `redis_password` either way; the `-redis.user` #}
      {# flag is what differentiates the ACL roles when lockdown #}
      {# is on. (wave-106 shipped this unconditionally and #}
      {# pointed the default-config exporter at a user the ACL #}
      {# file never rendered — wave-107 makes it conditional.) #}
      ExecStart=/usr/local/bin/redis_exporter \
        -redis.addr=redis://127.0.0.1:{{ redis_port }} \
        {% if redis_acl_lockdown | bool -%}
        -redis.user=redis_exporter \
        {% endif -%}
        -web.listen-address=:{{ redis_exporter_listen_port }}
      Restart=on-failure
      RestartSec=5s
      [Install]
      WantedBy=multi-user.target
  when: redis_exporter_version | length > 0

- name: enable redis_exporter
  systemd:
    name: redis_exporter
    enabled: yes
    state: started
    daemon_reload: yes
  when: redis_exporter_version | length > 0

# ── Sentinel-state textfile scraper ──────────────────────────────
# redis_exporter doesn't expose "who Sentinel currently believes
# the primary is" cleanly. Emit a small per-host gauge that ops
# dashboards can use to see failover events at a glance.
# F-1295 follow-up (codex audit-2026-05-13): the sentinel-state
# scraper script previously inlined `{{ redis_password }}` directly
# into a world-readable (0755) /usr/local/bin/ script. The script
# now reads the password from /etc/default/redis_exporter (0600
# root-only) and the systemd unit sets ProtectSystem=strict +
# DynamicUser-style restrictions — same secret-hygiene contract as
# the redis_exporter unit.
- name: install sentinel-state textfile scraper
  copy:
    dest: /usr/local/bin/redis-sentinel-textfile-scraper
    mode: "0755"
    content: |
      #!/bin/bash
      # Managed by ansible (redis-sentinel role). Emits Sentinel
      # cluster state as Prometheus textfile-collector format.
      set -euo pipefail
      OUT="{{ redis_node_exporter_textfile_dir }}/redis_sentinel.prom"
      TMP="$(mktemp "${OUT}.XXXXXX")"
      trap 'rm -f "$TMP"' EXIT

      # REDIS_PASSWORD is provided by the systemd unit's
      # EnvironmentFile=/etc/default/redis_exporter (mode 0600).
      # Empty/unset => script aborts; never inline the secret.
      if [ -z "${REDIS_PASSWORD:-}" ]; then
        echo "redis-sentinel-textfile-scraper: REDIS_PASSWORD empty" >&2
        exit 1
      fi

      PRIMARY=$(redis-cli -h 127.0.0.1 -p {{ redis_sentinel_port }} \
        -a "$REDIS_PASSWORD" --no-auth-warning \
        SENTINEL get-master-addr-by-name {{ redis_sentinel_master_name }} 2>/dev/null \
        | head -1 || echo "unknown")
      MY_HOST="{{ ansible_host }}"
      IS_PRIMARY=$([[ "$PRIMARY" == "$MY_HOST" ]] && echo 1 || echo 0)

      cat > "$TMP" <<EOF
      # HELP ratesengine_redis_sentinel_primary 1 if this host is the Sentinel-elected primary.
      # TYPE ratesengine_redis_sentinel_primary gauge
      ratesengine_redis_sentinel_primary $IS_PRIMARY
      EOF
      mv -f "$TMP" "$OUT"

- name: install sentinel-state scraper systemd unit
  copy:
    dest: /etc/systemd/system/redis-sentinel-textfile-scraper.service
    mode: "0644"
    content: |
      [Unit]
      Description=Redis Sentinel → Prometheus textfile scraper
      [Service]
      Type=oneshot
      # F-1295 follow-up: pull REDIS_PASSWORD from the 0600 env-file
      # rather than inlining into the script. Leading '-' allows the
      # service to fail-fast inside the script if the file is absent.
      EnvironmentFile=-/etc/default/redis_exporter
      ExecStart=/usr/local/bin/redis-sentinel-textfile-scraper

- name: install sentinel-state scraper timer
  copy:
    dest: /etc/systemd/system/redis-sentinel-textfile-scraper.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run Sentinel textfile scraper every 30 s
      [Timer]
      OnBootSec=30s
      OnUnitActiveSec=30s
      AccuracySec=5s
      [Install]
      WantedBy=timers.target

- name: enable sentinel-state scraper timer
  systemd:
    name: redis-sentinel-textfile-scraper.timer
    enabled: yes
    state: started
    daemon_reload: yes
