---
# Open Redis (6379) + Sentinel (26379) to internal CIDRs only.
# Pattern mirrors the patroni role's nftables drop-in approach.

- name: ensure nftables installed
  apt:
    name: nftables
    state: present

- name: ensure /etc/nftables.d/ exists
  file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: render redis-sentinel nftables drop-in
  copy:
    dest: /etc/nftables.d/41-redis-sentinel.conf
    mode: "0644"
    content: |
      # Managed by ansible (redis-sentinel role).
      # Redis data plane + Sentinel control plane, internal-only.
      table inet redis_filter {
        chain input {
          type filter hook input priority 0; policy accept;
      {% for cidr in redis_internal_cidrs %}
          ip saddr {{ cidr }} tcp dport { {{ redis_port }}, {{ redis_sentinel_port }} } accept comment "redis-{{ cidr }}";
      {% endfor %}
          ip saddr 127.0.0.1 tcp dport { {{ redis_port }}, {{ redis_sentinel_port }} } accept comment "redis-loopback";
          # Implicit: anything not from internal CIDRs hits the
          # main filter chain's defaults.
        }
      }
  notify: "firewall rules changed"

- name: ensure nftables loads our drop-in
  lineinfile:
    path: /etc/nftables.conf
    line: 'include "/etc/nftables.d/*.conf"'
    state: present
  notify: "firewall rules changed"
