---
- name: restart redis
  systemd:
    name: redis-server
    state: restarted
    daemon_reload: yes
  listen: "redis config changed"

- name: restart redis-sentinel
  systemd:
    name: redis-sentinel
    state: restarted
    daemon_reload: yes
  listen: "sentinel config changed"

- name: reload firewall
  systemd:
    name: nftables
    state: reloaded
  listen: "firewall rules changed"
