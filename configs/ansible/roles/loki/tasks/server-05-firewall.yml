---
- name: ensure nftables installed
  apt:
    name: nftables
    state: present

- name: ensure /etc/nftables.d/ exists
  file:
    path: /etc/nftables.d
    state: directory
    mode: "0755"

- name: render loki nftables drop-in
  copy:
    dest: /etc/nftables.d/44-loki.conf
    mode: "0644"
    content: |
      # Managed by ansible (loki role).
      # Loki ingest port from log_shippers on internal CIDR.
      table inet loki_filter {
        chain input {
          type filter hook input priority 0; policy accept;
      {% for cidr in loki_internal_cidrs %}
          ip saddr {{ cidr }} tcp dport {{ loki_http_port }} accept comment "loki-{{ cidr }}";
      {% endfor %}
        }
      }
  notify: "firewall rules changed"

- name: ensure nftables loads our drop-in
  lineinfile:
    path: /etc/nftables.conf
    line: 'include "/etc/nftables.d/*.conf"'
    state: present
  notify: "firewall rules changed"
