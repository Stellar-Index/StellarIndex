---
# F-1278 fix (codex audit-2026-05-13): render the COMPLETE
# /etc/nftables.conf for this host. Previously the role wrote a
# drop-in inside a separate `inet loki_filter` table with
# `policy accept`, which composed unpredictably with the repo's
# default-drop base chain. On HA-dedicated log_aggregator hosts
# the role now owns the whole-host firewall.

- name: ensure nftables installed
  apt:
    name: nftables
    state: present

- name: render full /etc/nftables.conf (default-drop + loki ingest + ssh)
  copy:
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nft -c -f %s"
    content: |
      #!/usr/sbin/nft -f
      # Managed by ansible (loki role) — DO NOT EDIT BY HAND.
      # F-1278: complete ruleset (was a no-op drop-in until 2026-05-13).
      flush ruleset

      table inet filter {
        set internal_v4 {
          type ipv4_addr
          flags interval
          elements = {
      {% for cidr in loki_internal_cidrs if ':' not in cidr %}
            {{ cidr }}{% if not loop.last %},{% endif %}
      {% endfor %}
          }
        }

        set ssh_allowed_v4 {
          type ipv4_addr
          flags interval
          elements = {
      {% for cidr in loki_allowed_ssh_cidrs if ':' not in cidr %}
            {{ cidr }}{% if not loop.last %},{% endif %}
      {% endfor %}
          }
        }

        chain input {
          type filter hook input priority filter; policy drop;

          ct state established,related accept
          ct state invalid drop

          iif lo accept

          ip protocol icmp limit rate 10/second accept
          ip6 nexthdr ipv6-icmp limit rate 10/second accept

          tcp dport 22 ip saddr @ssh_allowed_v4 ct state new limit rate 30/minute accept comment "ssh"

          # Loki ingest from log-shipper agents on internal CIDR.
          tcp dport {{ loki_http_port }} ip saddr @internal_v4 accept comment "loki-ingest-internal"

          limit rate 1/second log prefix "nft-drop: " flags all
        }

        chain forward {
          type filter hook forward priority filter; policy drop;
        }

        chain output {
          type filter hook output priority filter; policy accept;
        }
      }
  notify: "firewall rules changed"

- name: ensure nftables enabled + running
  systemd:
    name: nftables
    state: started
    enabled: true

- name: remove legacy 44-loki.conf drop-in (was no-op)
  file:
    path: /etc/nftables.d/44-loki.conf
    state: absent
  notify: "firewall rules changed"
