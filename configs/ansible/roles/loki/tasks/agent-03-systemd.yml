---
- name: render promtail systemd unit
  template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify: "promtail config changed"

- name: daemon-reload systemd
  systemd:
    daemon_reload: yes

- name: enable + start promtail
  systemd:
    name: promtail
    enabled: yes
    state: started
