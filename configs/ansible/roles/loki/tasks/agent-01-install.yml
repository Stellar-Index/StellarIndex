---
- name: ensure promtail system user exists
  user:
    name: "{{ promtail_user }}"
    system: yes
    shell: /usr/sbin/nologin
    home: "{{ promtail_data_dir }}"
    create_home: yes
    state: present

- name: add promtail to systemd-journal group (so it can read journal)
  user:
    name: "{{ promtail_user }}"
    groups: systemd-journal
    append: yes

- name: ensure promtail dirs exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/promtail,                  owner: root, group: "{{ promtail_user }}", mode: "0750" }
    - { path: "{{ promtail_data_dir }}",       owner: "{{ promtail_user }}", group: "{{ promtail_user }}", mode: "0750" }

- name: download promtail tarball
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: /tmp/promtail.zip
    mode: "0644"

- name: extract promtail binary
  unarchive:
    src: /tmp/promtail.zip
    dest: /tmp
    remote_src: yes

- name: install promtail binary
  copy:
    src: /tmp/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
