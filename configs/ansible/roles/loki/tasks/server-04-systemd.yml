---
- name: render loki systemd unit
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify: "loki config changed"

- name: daemon-reload systemd
  systemd:
    daemon_reload: yes

- name: enable + start loki
  systemd:
    name: loki
    enabled: yes
    state: started
