# Single-host Alertmanager config for R1.
#
# Companion to configs/prometheus/prometheus.r1.yml +
# configs/prometheus/rules.r1/. This config maps OUR severity
# vocabulary (page / ticket / informational) — the same
# vocabulary used by the multi-host Ansible template at
# configs/ansible/roles/prometheus/templates/alertmanager.yml.j2
# (the template converged on this severity ladder post-R1
# standup; F-1265, 2026-05-13). The remaining difference between
# the two is config shape, not severity vocabulary.
#
# Apply via configs/alertmanager/apply.sh — it env-substitutes the
# placeholder URLs from a sourced env file (kept off-disk in git per
# the deadmansswitch runbook).
#
# Chat fanout is Discord (Alertmanager-native discord_configs,
# v0.25+). Discord incoming webhooks are locked to one channel each,
# so pages and alerts use two separate webhook URLs
# (DISCORD_WEBHOOK_URL_PAGES, DISCORD_WEBHOOK_URL_ALERTS) — point both
# at the same webhook if you only want one channel.

global:
  resolve_timeout: 5m

# ─── Templating ──────────────────────────────────────────────────
# Inline templating only — no separate templates dir on R1.

# ─── Routing tree ────────────────────────────────────────────────
route:
  receiver: chat-default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    # Deadmansswitch — fires constantly. Routed to healthchecks.io.
    # When the heartbeat stops (Prometheus or Alertmanager itself
    # is broken), healthchecks.io pages us via a separate channel.
    # See docs/operations/runbooks/deadmansswitch.md.
    - matchers: [alertname = "stellarindex_deadmansswitch"]
      receiver: deadmansswitch
      group_interval: 60s
      repeat_interval: 60s
      continue: false

    # SEV-1 — page operators. Currently routes to chat-page; wire
    # PagerDuty in chat-page receiver below when integration_key is
    # provisioned.
    - matchers: [severity = "page"]
      receiver: chat-page
      continue: false

    # Ticket — actionable but not urgent. Same chat fanout, lower
    # repeat cadence.
    - matchers: [severity = "ticket"]
      receiver: chat-default
      repeat_interval: 24h
      continue: false

    # Informational — accumulates in Alertmanager UI. Doesn't fan
    # out to chat (would create noise).
    - matchers: [severity = "informational"]
      receiver: silent
      continue: false

# ─── Inhibit rules ───────────────────────────────────────────────
inhibit_rules:
  # If a page-severity alert fires for the same component, mute the
  # ticket + informational variants to avoid stacking.
  - source_matchers: [severity = "page"]
    target_matchers: [severity =~ "ticket|informational"]
    equal: [alertname, component]

# ─── Receivers ───────────────────────────────────────────────────
receivers:
  # Deadmansswitch heartbeat URL — env-substituted at apply time.
  - name: deadmansswitch
    webhook_configs:
      - url: ${HEALTHCHECKS_DEADMANSSWITCH_URL}
        send_resolved: false

  # Page-severity fanout → Discord #stellarindex-pages webhook.
  # Degrades silently if the URL isn't set.
  - name: chat-page
    discord_configs:
      - webhook_url: ${DISCORD_WEBHOOK_URL_PAGES}
        send_resolved: true
        title: '🚨 PAGE — {{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}Runbook: {{ .Annotations.runbook_url }}{{ end }}
          {{ end }}

  # Ticket-severity + default → Discord #stellarindex-alerts webhook,
  # less urgent text.
  - name: chat-default
    discord_configs:
      - webhook_url: ${DISCORD_WEBHOOK_URL_ALERTS}
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        message: |
          {{ range .Alerts }}
          **[{{ .Labels.severity | toUpper }}]** {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}Runbook: {{ .Annotations.runbook_url }}{{ end }}
          {{ end }}

  # Silent — informational alerts accumulate in the Alertmanager
  # UI without fanout. No webhook config means literally no
  # delivery; Alertmanager still tracks state.
  - name: silent
