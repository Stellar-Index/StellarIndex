# Rates Engine — single-node Prometheus on r1.
# Scrapes the local exporters; sends alerts to local Alertmanager.
# When R2/R3 land, switch to the configs/ansible/roles/prometheus
# 2-host HA topology (paired with R2 prometheus, AlertManager
# cluster on :9094).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    region: r1
    deployment: production

# Alerts go to local Alertmanager. No clustering today (single node);
# AlertManager fans out to webhook receivers per its own config.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Rule files. Operator deploys configs/prometheus/rules.r1/*.yml to
# /etc/prometheus/rules.r1/ (one ansible task — rsync or ansible.builtin.copy
# with the whole directory). Every file in this directory has a runbook
# at docs/operations/runbooks/ and is referenced from
# docs/operations/alerts-catalog.md; F-1219 (audit-2026-05-12) wants
# the full set loaded on R1 so we don't have silent-rule families.
#
# F-1222 (audit-2026-05-12) explains the R1 (hyphenated) vs multi-host
# (underscored) job-label divergence; this glob picks up the R1
# overlay copies in configs/prometheus/rules.r1/ which use the
# hyphenated names matching the scrape jobs above.
rule_files:
  - /etc/prometheus/rules.r1/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node_exporter
    static_configs:
      - targets: [localhost:9100]
        labels:
          host: r1

  - job_name: ratesengine-indexer
    static_configs:
      - targets: [localhost:9464]
        labels:
          binary: ratesengine-indexer
          host: r1

  - job_name: ratesengine-api
    static_configs:
      - targets: [localhost:3000]
        labels:
          binary: ratesengine-api
          host: r1

  - job_name: ratesengine-aggregator
    static_configs:
      - targets: [localhost:9465]
        labels:
          binary: ratesengine-aggregator
          host: r1

  - job_name: caddy
    static_configs:
      - targets: [localhost:2019]
        labels:
          host: r1
    metrics_path: /metrics

  # MinIO exposes metrics on :9000/minio/v2/metrics/cluster
  # (auth required; future).
  # Galexie exposes metrics on :6061/metrics (best-effort —
  # endpoint may hang per node-healthcheck.sh comment).
  - job_name: galexie
    static_configs:
      - targets: [localhost:6061]
        labels:
          host: r1
    scrape_timeout: 5s

  # ─── F-1220 (audit-2026-05-12) scrape-job coverage ─────────────
  # Multi-host parity for R1's single-host shape. The corresponding
  # rule files in configs/prometheus/rules.r1/ reference the metrics
  # these exporters emit (cache.yml, infra.yml, storage.yml). Each
  # job has a one-line comment naming the runbook that triages the
  # corresponding alert family.

  # redis_exporter — port 9121, installed by configs/ansible/roles/
  # archival-node/tasks/16-prometheus-exporters.yml on r1 (single-node
  # archival-node shape uses the `prometheus-redis-exporter` Debian
  # package; the redis-sentinel role's own 07-monitoring.yml ships a
  # tarball-based exporter on the Sentinel-cluster boxes). Feeds
  # cache.yml + the redis-writes-blocked + cache-miss-rate-high alert
  # families. Closed F-0152 on 2026-05-27.
  - job_name: redis_exporter
    static_configs:
      - targets: [localhost:9121]
        labels:
          host: r1
          service: redis

  # Alertmanager self-scrape — port 9093, the same target prometheus
  # already alerts TO. Self-scraping lets us alert on alertmanager
  # being down (alertmanager-bad-config + meta runbook family).
  # Required by the deadmansswitch heartbeat (configs/alertmanager/
  # alertmanager.r1.yml).
  - job_name: alertmanager
    static_configs:
      - targets: [localhost:9093]
        labels:
          host: r1

  # postgres_exporter — port 9187, installed by configs/ansible/roles/
  # archival-node/tasks/16-prometheus-exporters.yml (Debian package
  # `prometheus-postgres-exporter`, peer-auth on the local Unix socket
  # as the `postgres` superuser). Feeds storage.yml's pg_* alerts.
  # Closed F-0152 on 2026-05-27.
  - job_name: postgres_exporter
    static_configs:
      - targets: [localhost:9187]
        labels:
          host: r1
          service: postgres
    honor_labels: true

  # pgbackrest_exporter — port 9854 (upstream default), installed by
  # configs/ansible/roles/archival-node/tasks/16-prometheus-exporters.yml
  # (no Debian package; pinned upstream release from
  # https://github.com/woblerr/pgbackrest_exporter/releases — version
  # in `pgbackrest_exporter_version` default, SHA in inventory).
  # Closed F-0152 on 2026-05-27.
  - job_name: pgbackrest_exporter
    static_configs:
      - targets: [localhost:9854]
        labels:
          host: r1
          service: pgbackrest

  # MinIO cluster metrics — Bearer-token auth (per the bucket-level
  # `mc admin prometheus generate` output), so the operator wires
  # the bearer token via a bearer_token_file rendered by ansible.
  # Path differs from /metrics (the v2 path).
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: [localhost:9000]
        labels:
          host: r1
          service: minio
    # Bearer token rendered by ansible into /etc/prometheus/minio.token
    # — operator step. Until that file exists this job 401s; the
    # absence-of-series surfaces via meta.yml and the operator gets
    # a clear "wire the token" signal.
    bearer_token_file: /etc/prometheus/minio.token
