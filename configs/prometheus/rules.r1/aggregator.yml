---
# Aggregator alerts — matches docs/operations/alerts-catalog.md
# "Aggregator alerts" section. Every alert here has a runbook
# under docs/operations/runbooks/.
#
# These rules consume the orchestrator-level metrics added in
# internal/obs/metrics.go (see docs/reference/metrics/README.md
# § "Aggregator orchestrator metrics"). For alert thresholds we
# weight false-positive risk highest — operators can tune the
# durations/values once we have several weeks of pubnet runtime
# data on the new metric series.

groups:
  - name: stellarindex.aggregator
    interval: 30s
    rules:

      - alert: stellarindex_aggregator_silent
        expr: |
          sum(rate(stellarindex_aggregator_vwap_writes_total[5m])) == 0
          OR
          absent_over_time(stellarindex_aggregator_vwap_writes_total[10m]) == 1
        for: 5m
        labels:
          severity: page
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-silent.md
          summary: "Aggregator has stopped writing VWAP cache (P1)"
          description: |
            Zero VWAP writes for 5+ minutes. Either the orchestrator
            tick loop is wedged, the (pair, window) refresh path is
            consistently empty, or the Redis write is erroring on every
            attempt. /v1/vwap responses fall back to raw aggregation —
            slow, and the freshness signal API consumers depend on goes
            quiet within 60 s.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-silent.md

      - alert: stellarindex_aggregator_outlier_storm
        expr: |
          sum(rate(stellarindex_aggregator_dropped_trades_total{reason="outlier"}[10m]))
            > 5 * sum(rate(stellarindex_aggregator_dropped_trades_total{reason="outlier"}[1h] offset 1h))
        for: 15m
        labels:
          severity: ticket
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-outlier-storm.md
          summary: "Outlier-filter drop rate >5× baseline (P3)"
          description: |
            The σ-threshold filter is dropping trades at >5× its
            baseline rate (computed as the prior hour's drop rate one
            hour ago, so a sustained shift doesn't suppress the
            comparator). Usually a market-distress event flooding the
            window with anomalies; occasionally an upstream connector
            mis-decoding amounts. Either way the VWAP signal is
            degraded — a paged divergence alert is likely to follow.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-outlier-storm.md

      - alert: stellarindex_aggregator_fx_snap_fallback_dominant
        expr: |
          sum(rate(stellarindex_aggregator_fx_snap_fallback_total[15m]))
          /
          clamp_min(
            sum(rate(stellarindex_aggregator_triangulations_total{outcome="ok"}[15m])),
            1
          ) > 0.5
        for: 30m
        labels:
          severity: ticket
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-fx-snap-fallback-dominant.md
          summary: "FX snap fallback >50% of triangulations for 30m+ (P3)"
          description: |
            The X2.5 forex-factor-snap path is failing for more than
            half of triangulations — most chained-fiat rates are using
            the degraded cached-VWAP fallback instead of the bucket-end
            FX-source quote that ADR-0018 mandates for across-region
            consistency. Investigate FX ingestion: polygon-forex /
            exchangeratesapi connector health, and the trades hypertable's
            FX rows.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-fx-snap-fallback-dominant.md

      - alert: stellarindex_aggregator_class_drop_spike
        expr: |
          sum(rate(stellarindex_aggregator_dropped_trades_total{reason="class"}[10m]))
            > 10 * sum(rate(stellarindex_aggregator_dropped_trades_total{reason="class"}[1h] offset 1h))
        for: 15m
        labels:
          severity: ticket
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-class-drop-spike.md
          summary: "Class-filter drop rate >10× baseline (P3)"
          description: |
            The class filter is dropping trades at >10× its baseline
            rate. Most common cause: a new venue connector emitting
            trades that aren't yet registered in
            internal/sources/external/registry.go (so they hit the
            fail-closed fallback IncludeInVWAP=false). Less common:
            an existing aggregator/oracle source unexpectedly
            increased volume.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/aggregator-class-drop-spike.md

      # F-1253 (audit-2026-05-12): explicit alert on aggregator
      # cache-write-error rate. The May-10 SEV-2 (root-FS full →
      # Redis BGSAVE blocked → every Set returned MISCONF for ~9h)
      # surfaced only as customer 404s on rewritten pairs because
      # `flags.stale` was not flipped (the aggregator was running,
      # just unable to publish). The post-mortem
      # `internal/incidents/data/2026-05-10-redis-writes-blocked-disk-full.md`
      # explicitly recommends "alert on aggregator WARN rate (not
      # just service-up status)" — this is the metric realisation:
      # the new stellarindex_aggregator_vwap_cache_write_errors_total
      # counter (internal/obs/metrics.go) increments on every
      # cache Set failure, and any sustained non-zero rate is an
      # operator-page-worthy signal because it means the customer
      # surface is silently degraded.
      - alert: stellarindex_aggregator_cache_write_errors
        expr: |
          sum(rate(stellarindex_aggregator_vwap_cache_write_errors_total[5m])) > 0
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/redis-write-blocked-disk-full.md
          summary: "Aggregator failing to publish VWAPs to Redis cache (P1)"
          description: |
            VWAP cache writes are erroring; rewritten / triangulated /
            stablecoin-proxy pairs on /v1/price are about to start
            returning 404 (or already are). Most common cause: Redis
            BGSAVE is failing because the root FS is full
            (stop-writes-on-bgsave-error=yes default — May-10 SEV-2
            class). Recovery: free disk → BGSAVE → cache rebuilds.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/redis-write-blocked-disk-full.md

      # ─── #43: protocol-events rollup worker ────────────────────
      # The aggregator's protoeventsrollup worker folds the
      # trailing-24h per-source event census into protocol_events_24h
      # so /v1/protocols' events_24h reads a keyed-on-PK lookup. A
      # sustained refresh-error rate means that column stops advancing
      # (goes stale, not blank) — informational: no pricing impact.
      - alert: stellarindex_protocol_events_rollup_failing
        expr: |
          sum(rate(stellarindex_protocol_events_rollup_sweeps_total{outcome="refresh_error"}[15m])) > 0
        for: 30m
        labels:
          severity: informational
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/protocol-events-rollup-failing.md
          summary: "Protocol-events rollup sweeps failing ({{ $value | humanize }}/s error rate)"
          description: |
            The aggregator's protocol-events rollup worker has been
            failing its refresh (the trailing-24h census + upsert into
            protocol_events_24h) for 30+ minutes. /v1/protocols
            events_24h counters stop advancing (last-good values persist,
            not zeros). Customer pricing surface is unaffected. Fix the
            failing Postgres backend and the next sweep catches up.

      # ─── #43: asset-volume rollup worker ───────────────────────
      # The aggregator's assetvolrollup worker folds the trailing-24h
      # per-asset USD-volume SUM over prices_1m into asset_volume_24h
      # so the /v1/assets listing reads a keyed-on-PK lookup. A
      # sustained refresh-error rate means the listing's volume_24h_usd
      # stops advancing (goes stale, not blank) — informational: no
      # pricing impact.
      - alert: stellarindex_asset_volume_rollup_failing
        expr: |
          sum(rate(stellarindex_asset_volume_rollup_sweeps_total{outcome="refresh_error"}[15m])) > 0
        for: 30m
        labels:
          severity: informational
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/asset-volume-rollup-failing.md
          summary: "Asset-volume rollup sweeps failing ({{ $value | humanize }}/s error rate)"
          description: |
            The aggregator's asset-volume rollup worker has been failing
            its refresh (the trailing-24h prices_1m SUM + upsert into
            asset_volume_24h) for 30+ minutes. The /v1/assets listing's
            volume_24h_usd column stops advancing (last-good values
            persist, not zeros). Customer pricing surface is unaffected.
            Fix the failing Postgres backend and the next sweep catches up.

      # ─── Decimals-assumption landmine (decoder-correctness audit F2) ─
      # The served price is Σ(quote_amount)/Σ(base_amount) on RAW
      # smallest-unit integers (prices_* CAGGs + aggregate.VWAP); the
      # per-asset decimals cancel ONLY when base and quote share a scale
      # — true today because every DEX-traded token is 7-decimal. The
      # decimals-guard sweep (internal/decimalsguard, in the aggregator)
      # raises this counter the first time a DEX trade is observed for a
      # Soroban token whose on-chain decimals() != 7. As of 2026-07-10
      # EVERY serving path auto-normalizes via the
      # nonstandard_decimals_assets correction table
      # (aggregate.AdjustPrice / aggregate.ResolveDecimals), so a
      # detected non-7-decimal token is EXPECTED and HANDLED — this is
      # now an awareness signal, not an action item. The genuine risk
      # isn't "a non-7-decimal token exists", it's "the correction
      # isn't being applied" — see
      # stellarindex_nonstandard_decimals_correction_failing below for
      # that action-item alert.
      - alert: stellarindex_dex_nonstandard_decimals_detected
        expr: |
          sum by (source, asset) (stellarindex_dex_trade_nonstandard_decimals_total) > 0
        for: 5m
        labels:
          severity: informational
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/dex-nonstandard-decimals.md
          summary: "DEX trade for a non-7-decimal Soroban token detected — auto-corrected, no action needed"
          description: |
            A DEX trade landed for a Soroban token whose on-chain
            decimals() is not 7 (source {{ $labels.source }}, asset
            {{ $labels.asset }}). This is EXPECTED and HANDLED: every
            serving path (prices_* continuous aggregates + reads,
            aggregate.VWAP/TWAP/OHLC, /v1/price, /v1/vwap, /v1/twap,
            /v1/history, /v1/ohlc, /v1/chart, /v1/markets /v1/pools
            /v1/pairs, the SEP-40 oracle passthroughs) has normalized
            against the confirmed decimals since 2026-07-10 — see the
            runbook's "Mitigation" section. This alert is an awareness
            signal only, latching so operators can see which tokens
            have been confirmed non-7-decimal; it does not indicate a
            pricing error. If the correction ITSELF is failing (the
            refresh sweep erroring, or serving actively declining),
            stellarindex_nonstandard_decimals_correction_failing fires
            instead — that is the real action item.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/dex-nonstandard-decimals.md

      # ─── Decimals correction sweep/serving failing (the real risk) ───
      # The detection alert above is now expected noise — every
      # confirmed non-7-decimal token is auto-corrected. What ISN'T
      # supposed to happen is the correction mechanism itself failing:
      # either the aggregator's background sweep that seeds/refreshes
      # nonstandard_decimals_assets errors out
      # (NonstandardDecimalsCacheRefreshFailuresTotal), or a serving
      # path actively declines instead of normalizing
      # (PriceServeDeclinedNonstandardDecimalsTotal — dormant since the
      # 422 guard was removed in favor of normalization, but a real
      # failure signal if it ever increments again). Either means a
      # newly-detected non-7-decimal token's pairs revert to the raw
      # (skewed) ratio the detection alert above warns about — this is
      # the actual action item.
      - alert: stellarindex_nonstandard_decimals_correction_failing
        expr: |
          increase(stellarindex_nonstandard_decimals_cache_refresh_failures_total[15m]) > 0
          or
          increase(stellarindex_price_serve_declined_nonstandard_decimals_total[15m]) > 0
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/dex-nonstandard-decimals.md
          summary: "Non-7-decimals correction sweep failing or serving declining — tokens at risk of silent price skew (P2)"
          description: |
            Either the aggregator's nonstandard_decimals_assets
            refresh sweep is erroring
            (stellarindex_nonstandard_decimals_cache_refresh_failures_total),
            or a serving path is actively declining instead of
            normalizing (stellarindex_price_serve_declined_nonstandard_decimals_total).
            When the refresh sweep fails, newly-detected non-7-decimal
            tokens don't get their nonstandard_decimals_assets
            correction entry seeded/refreshed, so their pairs revert
            to the raw, skewed ratio that
            stellarindex_dex_nonstandard_decimals_detected exists to
            warn about — this is the genuine action item behind that
            latching detector. Investigate the aggregator's
            decimals-guard component (internal/decimalsguard) and the
            nonstandard_decimals_assets table directly.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/dex-nonstandard-decimals.md
