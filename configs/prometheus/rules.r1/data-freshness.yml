groups:
  - name: data-freshness
    rules:
      # The "never get behind" alert. Fires when any data domain/source is
      # staler than its expected cadence — the gap that let coingecko rot 11
      # days + sep1 metadata never populate, both unnoticed. Emitted by
      # data-freshness.sh (textfile collector, every 15 min).
      - alert: stellarindex_data_source_stale
        expr: |
          stellarindex_data_freshness_stale == 1
        for: 1h
        labels:
          severity: ticket
          team: stellarindex
          component: data-freshness
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/data-source-stale.md
          summary: "Data source {{ $labels.domain }}/{{ $labels.source }} is stale"
          description: |
            stellarindex_data_freshness_stale{domain="{{ $labels.domain }}",source="{{ $labels.source }}"} = 1
            — no fresh rows for {{ $labels.domain }}/{{ $labels.source }} beyond its expected
            cadence. A feed died (e.g. coingecko hit its API quota), a poller wedged, or a
            writer/timer stopped. The age is on
            stellarindex_data_freshness_age_seconds{domain="{{ $labels.domain }}",source="{{ $labels.source }}"}.

            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/data-source-stale.md

      # A source no longer reconciles to the certified lake. Now that the
      # ADR-0033 verdict is trustworthy + self-maintaining (rc.149), a
      # complete=false means a REAL served<>lake gap to re-derive.
      - alert: stellarindex_completeness_incomplete
        expr: |
          stellarindex_completeness_incomplete == 1
        for: 1h
        labels:
          severity: ticket
          team: stellarindex
          component: completeness
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/completeness-incomplete.md
          summary: "Source {{ $labels.source }} failed the ADR-0033 completeness verdict"
          description: |
            stellarindex_completeness_incomplete{source="{{ $labels.source }}"} = 1 — the served
            tier no longer reconciles to the certified ClickHouse lake for {{ $labels.source }}
            (latest verdict complete=false). A real served<>lake gap. Re-derive that source from
            the lake, then re-verify with compute-completeness.

            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/completeness-incomplete.md

      # The watchdog that catches every other staleness is itself dark.
      - alert: stellarindex_data_freshness_watchdog_silent
        expr: |
          absent_over_time(stellarindex_data_freshness_stale[45m])
        for: 15m
        labels:
          severity: ticket
          team: stellarindex
          component: data-freshness
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/data-freshness-watchdog-silent.md
          summary: "data-freshness watchdog stopped emitting"
          description: |
            stellarindex_data_freshness_stale has been absent > 45m — data-freshness.timer
            hasn't refreshed its textfile, so the watchdog that backstops coingecko/sep1/
            verdict staleness is blind. Check `systemctl status data-freshness.service` +
            its last journal on r1.

            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/data-freshness-watchdog-silent.md

      - alert: stellarindex_served_value_drift
        expr: stellarindex_served_value_ok == 0
        for: 26h
        labels:
          severity: ticket
          team: stellarindex
          component: data-truth
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/served-value-drift.md
          summary: "Served value {{ $labels.check }} diverges from independent ground truth"
          description: |
            verify-served-values found {{ $labels.check }} outside its
            tolerance vs its independent source (SDF lumen API /
            Stellar Expert) for two consecutive daily runs. This is
            the CS-010 class — the code is fine but the VALUE we
            serve is wrong. Investigate the derivation before
            customers or auditors sample it by hand.

      - alert: stellarindex_served_value_check_stale
        expr: time() - stellarindex_served_value_last_run_unix > 172800
        for: 1h
        labels:
          severity: ticket
          team: stellarindex
          component: data-truth
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/served-value-drift.md
          summary: "verify-served-values has not completed in 2 days"
          description: |
            The daily served-value truth harness hasn't written its
            textfile in 48h — the timer is dead or the run is
            crashing. Data-truth reconciliation is dark.
