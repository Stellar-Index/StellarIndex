---
# Meta / self-health alerts — catches Prometheus + AlertManager
# itself failing. The deadmansswitch is the "everything is
# silent" canary.

groups:
  - name: stellarindex.meta
    interval: 30s
    rules:

      - alert: stellarindex_prometheus_scrape_failing
        expr: up{job=~"stellarindex-api|stellarindex-indexer|stellarindex-aggregator|node_exporter|prometheus|caddy|galexie"} == 0
        for: 2m
        labels:
          severity: informational
          team: stellarindex
          component: meta
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/scrape-failing.md
          summary: "Prometheus scrape of {{ $labels.job }}@{{ $labels.instance }} failing"
          description: |
            A scrape target has been down for 2+ min. We lose visibility
            into that subsystem's health until it returns. Doesn't mean the
            subsystem is down — often the exporter is the problem.

      - alert: stellarindex_alertmanager_config_bad
        expr: alertmanager_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: meta
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/alertmanager-bad-config.md
          summary: "AlertManager config reload failed"
          description: |
            AlertManager reload failed. Any rule changes since the last
            good reload are NOT live. Investigate with
            `amtool check-config`.

      # ─── F-0085 (audit-2026-05-26): exporter-down meta-alerts ─────
      # The 2026-05-10 SEV-2 cascade exposed a blindness pattern: the
      # `stellarindex_redis_writes_blocked` alert watches
      # `redis_rdb_last_bgsave_status == 0`, but during the cascade
      # redis_exporter itself was DOWN — so the metric never reached
      # Prometheus, the alert evaluated `absent_gauge == 0` (no_data),
      # and never fired. The dependent alert was structurally unable
      # to surface the incident.
      #
      # These four meta-alerts close that gap for every exporter
      # whose absence would silence a downstream alert family:
      #   redis_exporter      → cache.yml + redis-writes-blocked
      #   postgres_exporter   → storage.yml pg_* + lock-table family
      #   pgbackrest_exporter → backup-failed + backup-none-24h
      #   minio               → galexie-archive + archive-completeness
      #
      # Pattern matches the F-0107 validated shape: `up == 0` catches
      # the exporter being scraped-but-failing, and
      # `absent_over_time(up{...}[5m]) == 1` catches the scrape target
      # disappearing from service-discovery entirely (so the up series
      # itself never exists). Either condition for 2m surfaces the
      # blindness within one alert-evaluation cycle of an exporter
      # failure — well before a downstream metric-dependent alert
      # would otherwise notice.

      - alert: stellarindex_redis_exporter_down
        expr: |
          up{job="redis_exporter"} == 0
          OR
          absent_over_time(up{job="redis_exporter"}[5m]) == 1
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: monitoring
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/exporter-down.md
          summary: "redis_exporter scrape target is down — cascade-blind for any alert that depends on it"
          description: |
            The redis_exporter Prometheus scrape target has been down
            for 2+ minutes. While it is down, every alert that depends
            on its metrics is silently blind — most importantly
            `stellarindex_redis_writes_blocked`
            (`redis_rdb_last_bgsave_status == 0`), the alert family in
            `configs/prometheus/rules.r1/cache.yml`, and any
            cache-miss / latency rule keyed on `redis_*`. This is the
            exact failure mode F-0085 isolated from the 2026-05-10
            SEV-2 incident: the metric-producing exporter died first,
            so the dependent alert evaluated `absent_gauge == 0`
            (no_data) and never fired. Follow the runbook to restart
            and verify the exporter; once scraping resumes the
            dependent alert families will re-evaluate on real data.

      - alert: stellarindex_postgres_exporter_down
        expr: |
          up{job="postgres_exporter"} == 0
          OR
          absent_over_time(up{job="postgres_exporter"}[5m]) == 1
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: monitoring
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/exporter-down.md
          summary: "postgres_exporter scrape target is down — cascade-blind for any alert that depends on it"
          description: |
            The postgres_exporter Prometheus scrape target has been
            down for 2+ minutes. While it is down, every alert that
            depends on `pg_*` metrics in
            `configs/prometheus/rules.r1/storage.yml` is silently
            blind — including `stellarindex_timescale_primary_down`,
            `stellarindex_timescale_replica_lag`,
            `stellarindex_timescale_lock_table_pressure`, and
            `stellarindex_timescale_connections_saturated`. This is
            the F-0085 blindness pattern surfaced by the 2026-05-10
            SEV-2 incident: the metric-producing exporter died first,
            so the dependent alert evaluated `absent_gauge == 0`
            (no_data) and never fired. Follow the runbook to restart
            and verify the exporter.

      - alert: stellarindex_pgbackrest_exporter_down
        expr: |
          up{job="pgbackrest_exporter"} == 0
          OR
          absent_over_time(up{job="pgbackrest_exporter"}[5m]) == 1
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: monitoring
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/exporter-down.md
          summary: "pgbackrest_exporter scrape target is down — cascade-blind for any alert that depends on it"
          description: |
            The pgbackrest_exporter Prometheus scrape target has been
            down for 2+ minutes. While it is down,
            `stellarindex_timescale_backup_failed` and
            `stellarindex_timescale_backup_none_24h`
            (`configs/prometheus/rules.r1/storage.yml`) are silently
            blind — both depend on
            `stellarindex_pgbackrest_last_success_unix`, which only
            this exporter publishes. A 24h RPO breach during exporter
            downtime would not surface until the exporter came back.
            This is the F-0085 blindness pattern from the 2026-05-10
            SEV-2 incident. Follow the runbook to restart and verify
            the exporter.

      - alert: stellarindex_minio_exporter_down
        expr: |
          up{job="minio"} == 0
          OR
          absent_over_time(up{job="minio"}[5m]) == 1
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: monitoring
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/exporter-down.md
          summary: "MinIO scrape target is down — cascade-blind for any alert that depends on it"
          description: |
            The MinIO Prometheus scrape target has been down for 2+
            minutes. While it is down, every alert that depends on
            MinIO cluster metrics (galexie-archive health,
            archive-completeness, archive-publish, and any
            object-storage usage / capacity rule) is silently blind.
            Because Galexie writes ledger metadata to MinIO and the
            indexer reads it back (ADR-0002), prolonged MinIO
            invisibility risks a repeat of the F-0085 blindness
            pattern from the 2026-05-10 SEV-2 — the metric-producing
            target dies first, so dependent alerts evaluate
            `absent_gauge == 0` (no_data) and never fire. Common
            causes here are a missing bearer-token file
            (`/etc/prometheus/minio.token` returning 401) and MinIO
            itself being stopped. Follow the runbook.

      # Deadmansswitch is inverse-logic: it fires constantly; AlertManager
      # routes it to an external receiver that watches for its heartbeat.
      # When the heartbeat stops, that receiver pages — which catches
      # BOTH Prometheus-down and AlertManager-down (our primary alerting
      # channels being broken).
      - alert: stellarindex_deadmansswitch
        expr: vector(1)
        for: 0s
        labels:
          severity: informational
          team: stellarindex
          component: meta
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/deadmansswitch.md
          summary: "This alert fires constantly — alarm is when it STOPS"
          description: |
            Routing target (e.g., an external watchdog.healthchecks.io URL)
            expects to receive this every minute. If it doesn't, IT pages
            us via a separate channel — which catches Prometheus or
            AlertManager being down.
