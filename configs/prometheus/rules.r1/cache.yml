---
# Redis cache alerts — per ADR-0007 key schema + HA plan §3.4 topology.

groups:
  - name: stellarindex.cache
    interval: 30s
    rules:

      # F-1329: redis_exporter emits no `role` label, so
      # `redis_up{role="master"}` matched no series and this PAGE was
      # dead. `redis_up` (1 = exporter reached the server, 0 = it could
      # not) is the direct liveness signal.
      - alert: stellarindex_redis_master_down
        expr: redis_up == 0
        for: 30s
        labels:
          severity: page
          team: stellarindex
          component: cache
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-master-down.md
        annotations:
          summary: "Redis master {{ $labels.instance }} down (SEV-1)"
          description: |
            A Redis master has been unreachable for 30+ s. Sentinel should
            promote a replica within 30 s — until it does, API handlers for
            keys on this shard fall back to Timescale with stale_flag=true.

      - alert: stellarindex_redis_memory_saturated
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 90
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: cache
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-memory.md
        annotations:
          summary: "Redis {{ $labels.instance }} memory {{ $value | humanize }}% used"
          description: |
            At > 90 % memory for 5+ minutes. allkeys-lru will start evicting
            rate-limit counters + asset-metadata caches. Plan a scale-up.

      - alert: stellarindex_redis_evictions_high
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: cache
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-memory.md
        annotations:
          summary: "Redis {{ $labels.instance }} evicting {{ $value | humanize }}/s keys"
          description: |
            Eviction rate exceeds 100/s sustained 5+ min. LRU pressure. API
            hit rates drop and Timescale fallback load rises.

      # ── INERT (F-1329) — NOT APPLICABLE ON R1 ─────────────────────
      # r1 is a SINGLE-NODE redis (no Sentinel, no replicas — see
      # docs/operations/r1-deployment-state.md). There is no replication
      # to monitor here, so this alert is intentionally INERT on the r1
      # overlay. The multi-host twin (deploy/monitoring/rules/cache.yml)
      # carries the live form: `redis_connected_slaves < 2` against the
      # ADR-0024 1-primary-2-replica topology. The expr below references
      # the never-emitted `redis_expected_slaves` precisely so it stays
      # non-firing on r1; it is TRACKED in scripts/ci/lint-metric-refs.sh's
      # KNOWN_INERT list. Drop both when r1 grows replicas.
      - alert: stellarindex_redis_replication_broken
        # INERT on r1: redis_expected_slaves has no producer; single-node.
        expr: |
          redis_connected_slaves < on(instance) redis_expected_slaves
        for: 2m
        labels:
          severity: ticket
          team: stellarindex
          component: cache
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/redis-replication.md
        annotations:
          summary: "Redis master {{ $labels.instance }} missing replicas"
          description: |
            Master reports fewer connected replicas than expected (< {{ $labels.expected }}).
            Sentinel can't promote on failover if replicas are gone.
