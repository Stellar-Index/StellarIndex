---
# Host + disk + NVMe + ZFS alerts. Complements the per-service
# rules — these catch the substrate failing out from under us.

groups:
  - name: stellarindex.infra
    interval: 30s
    rules:

      # F-1329: the scrape job is `node_exporter` in both the multi-host
      # (configs/ansible/.../prometheus.yml.j2) and r1
      # (configs/prometheus/prometheus.r1.yml) configs — there is no
      # `node` job, so `up{job="node"}` matched nothing and this alert
      # was dead. (The r1 overlay twin already used `node_exporter`.)
      - alert: stellarindex_host_down
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: ticket
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/host-down.md
          summary: "Host {{ $labels.instance }} unreachable"
          description: |
            node_exporter on {{ $labels.instance }} hasn't scraped in 2+ min.
            Either the host is down or the scrape path is broken. Service-
            level alerts (timescale/redis/api) on this host will also fire.

      - alert: stellarindex_host_cpu_high
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: informational
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/host-cpu-high.md
          summary: "Host {{ $labels.instance }} CPU at {{ $value | humanize }}%"
          description: |
            CPU > 90 % for 10+ minutes. Either a runaway process or undersized
            host. Dashboards show which service is the top consumer.

      - alert: stellarindex_host_memory_high
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
            / node_memory_MemTotal_bytes * 100 > 90
        for: 10m
        labels:
          severity: informational
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/host-memory-high.md
          summary: "Host {{ $labels.instance }} memory at {{ $value | humanize }}%"
          description: |
            > 90 % memory for 10+ min. OOMKill risk. Check per-service
            allocations; Postgres shared_buffers is the usual culprit if
            the box also runs other workloads.

      # F-1329: repointed from the never-emitted `node_zfs_pool_state`
      # (with UPPERCASE state values + a `pool` label) to node_exporter's
      # real ZFS collector metric `node_zfs_zpool_state`. That metric uses
      # LOWERCASE state values (online|degraded|faulted|offline|removed|
      # unavail|suspended) and labels the pool as `zpool`, with value 1 on
      # the pool's current state. The old name had no producer, so this
      # PAGE was silently dead through the 2026-05-17 zpool incident.
      - alert: stellarindex_zfs_pool_degraded
        expr: node_zfs_zpool_state{state=~"degraded|faulted|unavail|suspended"} > 0
        for: 60s
        labels:
          severity: page
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/zfs-degraded.md
          summary: "ZFS pool {{ $labels.zpool }} is {{ $labels.state }} (SEV-1)"
          description: |
            The data ZFS pool reports {{ $labels.state }} — one or more drives
            have failed. This pool is raidz1 (single parity): it tolerates
            only ONE drive failure — a second failure before the resilver
            completes means data loss. Replace + resilver IMMEDIATELY.

      # ── Pool capacity ─────────────────────────────────────────────
      # No zpool-level capacity metric on this box: node_exporter's ZFS
      # collector here exports only node_zfs_zpool_state + dataset IO
      # counters (no size/alloc/free). All ZFS datasets share the pool's
      # free space, so node_filesystem_avail_bytes{fstype="zfs"} (identical
      # across every dataset) is the pool-free proxy. Added 2026-07-17 after
      # the live R1 review found a ~90%-full pool with NO fullness alert.
      # Thresholds are absolute (box-specific): ~16.8 TiB usable, and ZFS
      # (copy-on-write) degrades sharply past ~90% and can stall writes
      # near-full, so page well before 0%.
      - alert: stellarindex_zfs_pool_low_space
        expr: min by (instance) (node_filesystem_avail_bytes{fstype="zfs"}) < 1.3e12
        for: 15m
        labels:
          severity: ticket
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/zfs-pool-full.md
          summary: "ZFS data pool free space low ({{ $value | humanize1024 }}B free)"
          description: |
            The data pool (raidz1, ~16.8 TiB usable) has under 1.3 TB free.
            All ZFS datasets share this pool, so every writer (ClickHouse lake,
            MinIO archive, Postgres, pgBackRest) is affected. ZFS is
            copy-on-write: performance degrades past ~90% and writes stall
            near-full. Plan reclamation (stale snapshots, pgBackRest off-box,
            TSDB compression) — see the storage section of the go-live master plan.
      - alert: stellarindex_zfs_pool_critical_space
        expr: min by (instance) (node_filesystem_avail_bytes{fstype="zfs"}) < 0.65e12
        for: 5m
        labels:
          severity: page
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/zfs-pool-full.md
          summary: "ZFS data pool CRITICALLY low ({{ $value | humanize1024 }}B free) (SEV-1)"
          description: |
            Under 650 GB free on the data pool. On a copy-on-write filesystem
            this risks write stalls / ingest failure across ClickHouse, MinIO,
            and Postgres. Reclaim space NOW (drop stale snapshots, move
            pgBackRest off-box) or ingestion will halt.

      # ── INERT (F-1329) — NO PRODUCER ──────────────────────────────
      # The two NVMe alerts below reference metrics that NOTHING on r1
      # emits. `node_disk_io_errors_total` and `node_nvme_temperature_celsius`
      # are NOT node_exporter metrics (the diskstats collector has no
      # io-errors series, and node_exporter has no NVMe-thermal collector).
      # SMART/NVMe health needs a `smartctl_exporter` or a textfile-collector
      # script writing into /var/lib/node_exporter/textfile_collector — NEITHER
      # is deployed today (configs/ansible confirms only sla-probe +
      # supply-snapshot write textfiles). These rules therefore never have a
      # series to evaluate; they are kept (so the alert + runbook survive for
      # when a SMART exporter lands) but are INERT and DO NOT page.
      #
      # TRACKED in scripts/ci/lint-metric-refs.sh's KNOWN_INERT list. To
      # un-inert: deploy smartctl_exporter (real metrics
      # `smartctl_device_media_errors_total`, `smartctl_device_temperature{...}`)
      # or a textfile script, then repoint the two exprs below at the real
      # series + drop the entries from KNOWN_INERT.
      - alert: stellarindex_nvme_smart_warn
        # INERT: node_disk_io_errors_total has no producer (see block above).
        expr: increase(node_disk_io_errors_total[1h]) > 0
        for: 1h
        labels:
          severity: ticket
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/nvme-smart.md
          summary: "NVMe {{ $labels.device }} reporting IO errors"
          description: |
            Any IO error on an NVMe is a warning sign — schedule a
            replacement during next maintenance window even if ZFS isn't
            complaining yet.

      - alert: stellarindex_nvme_thermal_throttle
        # INERT: node_nvme_temperature_celsius has no producer (see block above).
        expr: node_nvme_temperature_celsius > 70
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: infra
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/nvme-thermal.md
          summary: "NVMe {{ $labels.device }} at {{ $value }}°C"
          description: |
            Enterprise NVMe spec'd to 70 °C. Above this it throttles IO →
            catchup slows, Postgres WAL flush stalls. Check chassis airflow
            + ambient temperature.
