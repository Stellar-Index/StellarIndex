---
# Metrics-registry-present alerts (audit-2026-07-16 C4-4).
#
# Some components CAN run without a Prometheus Registry, in which case
# their metrics — and every alert built on those metrics — silently go
# DEAD (the source series is never registered, so the alert can never
# fire). The concrete case that motivated this: ledgerstream's buffer +
# TieredDataStore metrics register only when Config.Registry != nil, but
# the production builder (pipeline.LedgerstreamConfig) deliberately
# leaves it nil to avoid the SDK's re-registration panic across the
# archive→live→catch-up Stream calls. Result: stellarindex_ledgerstream_
# tier_read_total is not exported, so deploy/monitoring/rules/
# ledgerstream-tier.yml's `both_missing` page can NEVER fire.
#
# internal/obs/metrics.go exports stellarindex_metrics_registry_present
# {component} — set to 1 at boot when the component got a Registry, 0
# when it is running Registry-less. This alert makes the dead-alert
# state itself observable + alertable instead of lurking unnoticed.
#
# Scrape source: the indexer sets this gauge at startup (no textfile
# indirection). An ABSENT series means "this binary doesn't use the
# component" and is intentionally NOT alerted (only a present 0 is).

groups:
  - name: stellarindex.metrics_registry
    interval: 60s
    rules:

      - alert: stellarindex_metrics_registry_absent
        expr: stellarindex_metrics_registry_present == 0
        for: 15m
        labels:
          severity: informational
          team: stellarindex
          component: observability
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/metrics-registry-absent.md
          summary: "Component {{ $labels.component }} is running WITHOUT a metrics Registry — its metrics + dependent alerts are dead"
          description: |
            stellarindex_metrics_registry_present{component="{{ $labels.component }}"} = 0
            — the named component was started without a Prometheus Registry,
            so the metrics it would otherwise export are not registered and
            any alert built on them can NEVER fire (a silent monitoring-
            coverage hole, not an active outage).

            For component="ledgerstream" this means
            stellarindex_ledgerstream_tier_read_total is dead, so the
            ledgerstream-tier `both_missing` page is inert. This is the
            known nil-Registry state (LedgerstreamConfig leaves Registry nil
            to dodge the SDK's re-registration panic). Remediation is a code
            fix — make the ledgerstream metric registration idempotent, then
            wire obs.Registry through LedgerstreamConfig — after which this
            gauge flips to 1 and the alert clears.

            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/metrics-registry-absent.md
