# golangci-lint config for Stellar Index.
#
# Lives at repo root. Applied via `make lint` and in CI. Any rule
# change requires a PR + rationale; we don't weaken lint "just to
# unblock something." See docs/discovery/engineering-standards.md §8.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  # Tests are first-class code — they get linted too.
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - govet
    - staticcheck
    - errcheck
    - errorlint
    - bodyclose
    - contextcheck
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - wastedassign
    - ineffassign
    - gosec
    # Exhaustiveness — ADR-0010. Catches enum switches that silently
    # drop a variant when a new one is added (a switch on an AssetType /
    # Basis / Class / EventKind that forgets a case). default-signifies-
    # exhaustive keeps false positives near zero.
    - exhaustive

    # Style / clarity
    #
    # gofmt + goimports moved to the `formatters:` section below —
    # in golangci-lint v2 they are formatters, not linters.
    # gosimple was merged into staticcheck in v2.
    - unparam
    - unused
    - misspell
    - predeclared
    - usestdlibvars

    # Complexity guards
    - gocognit
    - gocyclo
    - funlen

  settings:
    exhaustive:
      # A `default:` case counts as handling the remaining variants — so
      # exhaustive only flags a switch that is BOTH missing enum cases AND
      # has no default. This is the low-noise setting: it catches the real
      # "forgot to add the new variant" bug without forcing a case-per-
      # variant on switches that intentionally default.
      default-signifies-exhaustive: true
      # BACKLOG #48 probe (2026-07-05): the strict form below floods 12
      # findings repo-wide — of which only 3 are AssetType switches
      # (canonical/sac.go, supply/key.go, xdrjson/sac.go — all
      # intentional error-defaults for unsupported classes), plus 2
      # reflect.Kind walkers and 7 misc. The linter can't scope
      # strictness to one enum type, so the strict form stays off; the
      # 3 AssetType defaults are correct rejection paths, not missed
      # variants.
      # default-signifies-exhaustive: false
      #
      # ROADMAP #48 resolution (2026-07-09): rather than fight this
      # linter's repo-wide scope, internal/canonical/
      # asset_type_exhaustive_guard_test.go (TestAssetTypeExhaustiveGuard)
      # adds a second, narrow guard — a go/types AST walk restricted to
      # switches tagged on canonical.AssetType specifically, at full
      # strictness, with zero noise on any other enum. It also catches
      # something this setting structurally cannot: a `default:` clause
      # present but empty/fallthrough-only, which this linter counts as
      # "exhaustive" without ever looking inside it. Shares the same
      # `//exhaustive:ignore` escape hatch as this linter (see
      # internal/storage/timescale/usd_volume_quote_spec.go for the one
      # documented site). Runs as a plain `go test ./internal/canonical/...`
      # — already covered by `make test` / `make verify`, no separate
      # wiring needed.
      # Ignore enums we don't own: the go-stellar-sdk `xdr.*` enums have
      # 20+ variants and our decoders intentionally handle a subset (a
      # ManageOffer decoder shouldn't enumerate every OperationType), and
      # `time.Duration` isn't a real enum (its named constants are units).
      # Enforcement is scoped to OUR domain enums, where a forgotten
      # variant is a real bug.
      ignore-enum-types: 'xdr\.|time\.Duration'
    gocognit:
      # Soft limit per engineering-standards.md §4.8 — 20 lets
      # genuinely linear state-machines and dispatcher tables
      # through while still flagging the "why does this function
      # exist" kind of mess at 25+.
      min-complexity: 20
    gocyclo:
      min-complexity: 20
    funlen:
      # Soft limit. See engineering-standards.md §4.8. Enforced via
      # code review for genuine exceptions. 100/60 covers
      # dispatch-heavy handlers (handleHistory, handleVWAP,
      # buildDispatcher) that read better linearly than split
      # into one-shot helpers.
      lines: 100
      statements: 60
    gosec:
      excludes:
        # G104 — we use errorlint/errcheck for unchecked errors;
        # gosec's G104 is noisy on intentional ignores.
        - G104
        # G101 — "hardcoded credentials" false-positives on const
        # strings that happen to contain the word "key" or "token"
        # (e.g. an env-var NAME constant). Our real secrets never
        # appear as Go literals.
        - G101
        # G115 — "integer overflow" on int→uint32 / uint64→int64
        # conversions. Every flagged site is a Soroban XDR field
        # where the upstream schema caps the range safely (ledger
        # uint32, op_index int that can't exceed 255, etc). Adding
        # bounds checks everywhere would be noise; gosec has no
        # way to see the upstream invariant.
        - G115
        # G404 — "weak random for security". Every flagged site is
        # a reconnect-backoff jitter or a non-security sample.
        # crypto/rand would be incorrect (blocking + rate-limited
        # on some platforms) in a reconnect loop.
        - G404
    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    generated: strict
    rules:
      # Test files can have longer setups + HTTP plumbing that test
      # helpers (mustGet, newTestServer) already cleanup via
      # t.Cleanup — the bodyclose linter can't see through the
      # helper, and ctx-less http.Get is fine in a test that's
      # already scoped by the testing package's own timeouts.
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - gocyclo
          - bodyclose
          - noctx
          - errcheck
          - gosec
          - unparam
          - staticcheck
      # Generated files: never lint.
      - path: "(^|/)zz_generated.*\\.go$"
        linters:
          - unused
          - staticcheck
      # cmd/* main.go has fatal-on-error patterns.
      - path: cmd/.*/main\.go
        linters:
          - errcheck

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
  # CI posts a summary of new issues only; but local runs show everything.

output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true
      colors: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/StellarIndex/stellar-index
