---
# Ledgerstream tier-read alerts per ADR-0027 (LCM cache tiering).
#
# Scrape source: the indexer's TieredDataStore in
# `internal/ledgerstream/tiered.go` emits its own metrics under the
# `stellarindex_ledgerstream_` namespace — no textfile-collector
# indirection. Pre-§3 (cold-tier disabled) the cold path never runs
# and these metrics stay at zero; the alert is a no-op until the
# operator enables tiering and the bulk-trim is done.
#
# Alert family:
#
#   - `stellarindex_ledgerstream_tier_both_missing` — increase > 0
#     sustained 5 min. Both hot (local galexie-archive) AND cold
#     (aws-public-blockchain) responded with not-found for the same
#     LCM. The indexer cannot progress; depending on which cursor
#     hit this, either live ingest stalls or a backfill job dies.
#     Severity: page (this is the cold-tiering failure mode the
#     ADR-0027 rollout sequence was designed to make recoverable
#     — see the runbook for the rehydrate path).

groups:
  - name: stellarindex.ledgerstream_tier
    interval: 60s
    rules:

      - alert: stellarindex_ledgerstream_tier_both_missing
        expr: increase(stellarindex_ledgerstream_tier_read_total{outcome="both_missing"}[5m]) > 0
        for: 5m
        labels:
          severity: page
          team: stellarindex
          component: ledgerstream
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/ledgerstream-tier-both-missing.md
        annotations:
          summary: "LCM read missed BOTH tiers in the last 5 min — indexer cannot progress"
          description: |
            The TieredDataStore tried to read at least one
            LedgerCloseMeta object that returned "not found" from
            BOTH the local galexie-archive (hot) AND the
            aws-public-blockchain bucket (cold). The indexer or
            backfill consumer that hit this is now stalled.

            Most likely causes (runbook walks them):
              1. The hot range has been trimmed and the
                 corresponding cold object is missing or
                 inaccessible — AWS Open Data partition is in a
                 transient miss state, or the partition naming
                 drifted, or the AWS sponsorship has lapsed.
              2. A local trim ran too aggressively (the live
                 cursor moved backwards onto a trimmed range).
              3. The MinIO endpoint, the AWS endpoint, or both,
                 are mis-configured for this binary.
