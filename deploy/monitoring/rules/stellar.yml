---
# Stellar node alerts — stellar-core, stellar-rpc, archive publishing.
#
# Deployment posture (2026-04-23 onward): r1 does NOT run stellar-core
# or stellar-rpc — both were removed in the FSN1 trim along with the
# stellar-core-prometheus-exporter (see
# `docs/operations/r1-deployment-state.md` §Services). On r1 the
# core/rpc alerts below are therefore *inert*: their underlying
# metrics have no producer, so the rules never evaluate to true and
# no series exists for the `for:` window to start. Each runbook
# under `docs/operations/runbooks/` carries the same disclaimer.
#
# The rules stay in this file because Phase-3 (Tier-1 validator
# rollout per ADR-0004) brings stellar-core back, at which point
# `run_stellar_core` flips on in the ansible role and the
# stellar-core-prometheus-exporter starts producing the metrics
# below. Removing the rules now would force re-authoring them at
# Phase-3; keeping them inert costs nothing.
#
# Of the two archive alerts in this file:
#   - stellarindex_stellar_archive_publish_fail references
#     `stellarindex_stellar_archive_publish_errors_total`. NOTHING IN
#     THIS CODEBASE EMITS THAT METRIC (F-1329; confirmed by grep over
#     internal/ cmd/ scripts/ 2026-06-11) — there is no
#     stellar-archivist publish loop wired to a Prometheus counter, so
#     this rule is INERT regardless of deployment posture. It is
#     listed in scripts/ci/lint-metric-refs.sh as a known-inert
#     stellarindex_* reference (allowlisted there) until a publish-error
#     emitter is added. r1 doesn't publish a history archive anyway.
#   - stellarindex_stellar_archive_divergence is ACTIVE on r1: it now
#     references `stellarindex_verify_archive_mismatches_total{reason=~"chain|sequence|checkpoint"}`
#     (internal/obs/metrics.go) — the counter the verify-archive Tier-D
#     job emits per chunk_idx + reason. The previous expr pointed at
#     `stellarindex_archive_divergence_total`, a name nothing emits
#     (F-1329); repointed 2026-06-11.

groups:
  - name: stellarindex.stellar
    interval: 30s
    rules:

      - alert: stellarindex_stellar_core_ledger_age
        expr: (time() - stellarindex_stellar_core_last_ledger_time_unix) > 60
        for: 2m
        labels:
          severity: page
          team: stellarindex
          component: stellar
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/core-lag.md
        annotations:
          summary: "stellar-core ledger age {{ $value | humanizeDuration }} (SEV-1)"
          description: |
            stellar-core hasn't applied a ledger in > 60 s. Either the node
            is out of sync (catchup required) or it's disconnected from the
            network. Upstream data to our pipeline halts.

      - alert: stellarindex_stellar_core_peers_low
        expr: stellarindex_stellar_core_peer_count < 5
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: stellar
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/core-peers.md
        annotations:
          summary: "stellar-core has only {{ $value }} peers"
          description: |
            stellar-core connected to < 5 peers. Quorum resilience degraded.
            Check firewall (11625 open), preferred peers list, network health.

      - alert: stellarindex_stellar_rpc_lag
        expr: stellarindex_stellar_rpc_latest_ledger_age_seconds > 300
        for: 5m
        labels:
          severity: ticket
          team: stellarindex
          component: stellar
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/rpc-lag.md
        annotations:
          summary: "stellar-rpc lagging by {{ $value | humanizeDuration }}"
          description: |
            stellar-rpc's latestLedger is > 5 min behind wall-clock. Its
            captive-core may be catching up. Indexer continues reading from
            it but with increasing freshness debt.

      - alert: stellarindex_stellar_archive_publish_fail
        expr: increase(stellarindex_stellar_archive_publish_errors_total[1h]) > 0
        for: 1h
        labels:
          severity: informational
          team: stellarindex
          component: stellar
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/archive-publish.md
        annotations:
          summary: "Archive-publish errors in the last hour"
          description: |
            stellar-core failed to publish a checkpoint to our history archive.
            Not customer-visible but affects Tier-1 posture if sustained.

      - alert: stellarindex_stellar_archive_divergence
        # F-1329: repointed from the never-emitted
        # `stellarindex_archive_divergence_total` to the real counter the
        # verify-archive Tier-D job emits. `reason` ∈ {chain|sequence|checkpoint};
        # any non-zero increase over a recent window is a hard correctness signal.
        expr: increase(stellarindex_verify_archive_mismatches_total[1h]) > 0
        for: 0s
        labels:
          severity: page
          team: stellarindex
          component: stellar
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/archive-divergence.md
        annotations:
          summary: "Archive hash divergence detected (SEV-1)"
          description: |
            Our published archive's bucket hash differs from at least one
            reference archive (SDF/LOBSTR/Satoshipay). This is a correctness
            signal — investigate immediately. If unresolved, delist the
            affected checkpoints.
