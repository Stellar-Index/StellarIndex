---
# Anomaly + freeze alerts — driven by the metrics emitted in
# internal/aggregate/orchestrator (see ADR-0019). The orchestrator
# writes a freeze marker to Redis when ActionFreeze fires; the API
# reads the marker on every /v1/price request and surfaces
# flags.frozen=true. Both ends are tracked via
# stellarindex_anomaly_freeze_engaged_total — a counter labelled by
# asset class.
#
# Why a counter (not a gauge): the orchestrator doesn't currently
# track per-(asset, quote) "is this pair frozen RIGHT NOW" state;
# it ticks every 30s and emits ActionFreeze decisions one-shot. A
# sustained freeze (the underlying anomaly persists) shows up as a
# steady stream of counter increments. The alerts use rate() over
# windowed ranges to differentiate one-tick blips from a real
# sustained event.
#
# Per-asset granularity is not currently a label on the metric (the
# orchestrator's hot path keeps the label set bounded to AssetClass).
# Per-pair freeze details live in the freeze:<asset>:<quote> Redis
# marker JSON; operator runbook reads from there during triage.

groups:
  - name: stellarindex.anomaly
    interval: 30s
    rules:

      - alert: stellarindex_anomaly_freeze_engaged
        expr: |
          sum by (class) (rate(stellarindex_anomaly_freeze_engaged_total[5m])) > 0
        for: 1m
        labels:
          severity: ticket
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/anomaly-freeze-engaged.md
          summary: "Anomaly freeze engaged on class {{ $labels.class }} (P3)"
          description: |
            The aggregator's anomaly checker emitted ActionFreeze
            for at least one (pair, window) within the last 5
            minutes, asset class {{ $labels.class }}. The affected
            pair's /v1/price now serves the previous bucket's
            last-known-good VWAP with flags.frozen=true.
            The freeze marker auto-clears 5 minutes after the last
            ActionFreeze decision (per cachekeys.FreezeTTL); a
            sustained freeze keeps the counter incrementing.
            Inspect the freeze:<asset>:<quote> Redis keys to
            identify the affected pair(s); manual override via
            policy YAML if confirmed false-positive.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/anomaly-freeze-engaged.md

      - alert: stellarindex_anomaly_freeze_sustained
        expr: |
          sum by (class) (rate(stellarindex_anomaly_freeze_engaged_total[1h])) > 0
        for: 1h
        labels:
          severity: page
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/anomaly-freeze-engaged.md
          summary: "Anomaly freeze sustained for 1h+ on class {{ $labels.class }} (P1)"
          description: |
            Freeze decisions for asset class {{ $labels.class }}
            have been emitted continuously over the last hour. Three
            common patterns:

            1. Real market event — typically resolves in minutes.
            2. Threshold mis-tune — Phase 1 fires on legitimate
               volatility; widen the class threshold + reload.
            3. **Cold baseline (Phase 2)** — when historical trades
               are sparse (e.g. backfill is still mid-run, only
               7d of prices_1h available), the per-asset baseline's
               z-score is unstable and Phase 2 false-fires across
               every pair. Symptom: counter rate increases steadily
               while flags.frozen never sticks (the per-pair Redis
               marker is empty even though the counter is climbing).
               In this case the runbook is to widen the Phase 2
               z-score floor OR wait for the catch-up backfill to
               complete (docs/operations/backfill-procedure.md
               §"One-year retention catch-up").

            Triage:
              - `journalctl -u stellarindex-aggregator | grep "phase2 freeze"`
                lists the per-pair decisions with confidence + z-score.
              - `redis-cli KEYS 'freeze:*' | wc -l` — if this is 0
                while the counter climbs, no marker is being written
                (writer_wired=false in the log line) → no customer
                impact, but the alert is still real signal.
              - `SELECT COUNT(*) FROM freeze_events WHERE recovered_at IS NULL`
                — durable mirror; should track Redis when both wire.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/anomaly-freeze-engaged.md

      # Recovery-side health: the freeze recovery worker closes
      # durable freeze_events rows once the Redis marker TTL elapses.
      # When it stalls, the explorer /anomalies timeline shows
      # resolved freezes as still-firing — silent quality regression
      # rather than an outage. F-1229.
      - alert: stellarindex_anomaly_freeze_recovery_stalled
        expr: |
          sum(rate(stellarindex_anomaly_freeze_engaged_total[1h]))
            > sum(rate(stellarindex_anomaly_freeze_recovered_total[1h]))
            and on() (sum(rate(stellarindex_anomaly_freeze_recovery_sweeps_total{outcome!="ok"}[15m])) > 0)
        for: 2h
        labels:
          severity: ticket
          team: stellarindex
          component: aggregator
        annotations:
          runbook_url: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/freeze-recovery-stalled.md
          summary: "Freeze recovery worker is stalled (P3)"
          description: |
            stellarindex_anomaly_freeze_engaged_total has outpaced
            stellarindex_anomaly_freeze_recovered_total for 2h+, AND
            the recovery worker reported sweep failures within the
            last 15 min. The durable freeze_events table is
            accumulating open rows that the explorer /anomalies
            timeline will show as forever-firing.

            The API itself is unaffected — flags.frozen is driven by
            the Redis marker, not the durable mirror. Customer-facing
            data is correct; only the explorer history is wrong.

            Most common cause: postgres connection pool exhaustion
            or a Redis ACL drift. Check the recovery worker logs
            (component=freeze-recovery) for the specific transport
            error.
            Runbook: https://github.com/Stellar-Index/StellarIndex/blob/main/docs/operations/runbooks/freeze-recovery-stalled.md
