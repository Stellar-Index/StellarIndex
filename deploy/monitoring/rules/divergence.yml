---
# Price-quality alerts — cross-source divergence detection +
# oracle-staleness. These are "data correctness" signals, not
# infrastructure — but they escalate as P2 when the numbers are bad.

groups:
  - name: stellarindex.divergence
    interval: 60s
    rules:

      # ── INERT (F-1329) — NO PRODUCER ──────────────────────────────
      # The two price-divergence alerts below reference
      # `stellarindex_our_price` / `stellarindex_reference_price` as
      # Prometheus gauges. NOTHING EXPORTS THESE AS METRICS. The
      # divergence worker (internal/divergence/worker.go) computes
      # our_price / ref_price / delta_pct but writes them to Postgres
      # (divergence_observations) + the Redis div:<asset> cache and
      # surfaces them via the API's `flags.divergence_warning` — not via
      # the Prometheus registry. The LIVE Prometheus signal for the same
      # failure is `stellarindex_divergence_refresh_error_dominant` below,
      # which DOES use an emitted metric. Exposing a per-asset price gauge
      # would add high-cardinality series and is out of scope here. These
      # two rules are kept (the runbook + intent survive) but INERT and
      # TRACKED in scripts/ci/lint-metric-refs.sh's KNOWN_INERT list.
      - alert: stellarindex_price_divergence_warning
        # INERT: stellarindex_our_price / stellarindex_reference_price have no
        # Prometheus producer (divergence values live in PG + Redis, not the registry).
        expr: |
          abs(stellarindex_our_price - stellarindex_reference_price)
            / stellarindex_reference_price > 0.05
        for: 2m
        labels:
          severity: informational
          team: stellarindex
          component: divergence
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/price-divergence.md
        annotations:
          summary: "{{ $labels.asset }} {{ $value | humanizePercentage }} off reference"
          description: |
            Our aggregated price for {{ $labels.asset }} differs from reference
            ({{ $labels.reference_source }}) by > 5 % sustained 2 min.
            Normal during rapid market moves; investigate if sustained.

      - alert: stellarindex_price_divergence_critical
        # INERT: see the price_divergence_warning block above — no Prometheus
        # producer for stellarindex_our_price / stellarindex_reference_price.
        expr: |
          abs(stellarindex_our_price - stellarindex_reference_price)
            / stellarindex_reference_price > 0.10
        for: 2m
        labels:
          severity: ticket
          team: stellarindex
          component: divergence
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/price-divergence.md
        annotations:
          summary: "{{ $labels.asset }} {{ $value | humanizePercentage }} off reference (critical)"
          description: |
            Divergence > 10 % from reference sustained 2 min. This is usually
            a bad ingest (wrong decimals, stale source contributing) rather
            than a real market move.

      - alert: stellarindex_oracle_stale
        expr: |
          (time() - stellarindex_oracle_last_update_unix)
            > 10 * stellarindex_oracle_resolution_seconds
        for: 2m
        labels:
          severity: ticket
          team: stellarindex
          component: divergence
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/oracle-stale.md
        annotations:
          summary: "Oracle {{ $labels.source }} stale for {{ $labels.asset }}"
          description: |
            {{ $labels.source }} hasn't published a price for {{ $labels.asset }}
            in > 10× its resolution. May be legitimate (oracle paused) or a
            signal of oracle failure — check the oracle's own status page.

      # Aggregator's divergence-cache refresh loop — `refresh_error`
      # outcome dominates the success rate. CoinGecko / Chainlink
      # unreachable, marshal failure, or Redis cache write failing.
      # Sustained means `flags.divergence_warning` goes stale across
      # the API surface (the cache TTL is 5 min — we have a few-tick
      # grace window before consumers see staleness).
      #
      # Threshold: `refresh_error` rate exceeds `ok` rate AND total
      # rate is non-zero (avoids firing during cold start when both
      # rates are 0). 30-min sustained is the trigger — shorter
      # windows catch transient blips that recover on their own.
      - alert: stellarindex_divergence_refresh_error_dominant
        expr: |
          sum(rate(stellarindex_divergence_refresh_total{outcome="refresh_error"}[5m]))
            >
          sum(rate(stellarindex_divergence_refresh_total{outcome="ok"}[5m]))
          and
          sum(rate(stellarindex_divergence_refresh_total{outcome=~"refresh_error|ok"}[5m])) > 0
        for: 30m
        labels:
          severity: ticket
          team: stellarindex
          component: divergence
          runbook_url: https://github.com/StellarIndex/stellar-index/blob/main/docs/operations/runbooks/divergence-refresh-error-dominant.md
        annotations:
          summary: "Divergence-cache refresh failing more often than succeeding (P3)"
          description: |
            More refresh_error outcomes than ok over the last 5 min for
            30+ min sustained. CoinGecko / Chainlink RPC reachability is
            the usual cause; the API's `flags.divergence_warning` stops
            updating and goes stale once the 5-min cache TTL elapses.
            Check the upstream reference's status, then the aggregator's
            `divergence refresher wired` startup log line for which
            references are configured.
