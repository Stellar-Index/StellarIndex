name: ansible-drift

# The codified≠live guarantee (2026-07-03 drift audit): a weekly
# --check --diff of the archival-node playbook against live r1. Any
# reported change means the two have diverged — a hand fix that needs
# codifying, or repo config that needs applying. Either way the
# workflow FAILS loudly instead of the gap surfacing as an incident
# months later (the 2026-06-11 rsyslog rules were "fixed" in ansible
# but never live; the reverse direction nearly had a playbook erase
# the CS-010 supply config).
#
# Secrets (all four must be current — set in repo settings):
#   - DEPLOY_SSH_PRIVATE_KEY  (same key deploy.yml uses)
#   - R1_SSH_KNOWN_HOSTS      (base64 of the pinned r1 host key — the same
#                              secret deploy.yml pins; REQUIRED, there is no
#                              live ssh-keyscan fallback anymore)
#   - ANSIBLE_VAULT_PASSWORD  (the r1.secrets.yml vault password)
#   - ANSIBLE_VAULT_FILE_B64  (base64 of the encrypted r1.secrets.yml)
# NOTE (2026-07-17): ANSIBLE_VAULT_PASSWORD must match the vault that
# ANSIBLE_VAULT_FILE_B64 was encrypted with. After the 2026-07-03 vault
# rotation these drifted — a manual dispatch failed with
# "Invalid vault password" (the SSH + checkout + ansible-install steps all
# passed, so only the secret is stale). Re-set both from the current vault.
#
# SCHEDULING (2026-07-17): this cron has never fired — no scheduled run has
# ever executed for this workflow OR security.yml (both added early-July),
# despite multiple Mondays passing. The repo is public + active + not a fork,
# so this is a GitHub scheduled-workflow registration/enablement gap, not a
# workflow defect. Verify Settings → Actions is not restricting schedules;
# a manual `workflow_dispatch` always works as a fallback.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install ansible
        run: pipx install --include-deps ansible && pipx inject ansible passlib

      - name: SSH key + known_hosts
        # Mirrors deploy.yml's "Set up SSH" step (F-1297/F-1298):
        #  - route the deploy key through `env:`, never interpolate a
        #    `${{ secrets.* }}` into the shell, and write it with printf.
        #  - PIN the host key from R1_SSH_KNOWN_HOSTS and fail fast if it
        #    is unset. The previous live `ssh-keyscan` trusted whatever
        #    key was served on the wire — a silent MITM hole in a job that
        #    carries the deploy key + vault password (host_key_checking is
        #    True in ansible.cfg, so this known_hosts is load-bearing).
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS_B64: ${{ secrets.R1_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # inventory/r1.yml pins ansible_ssh_private_key_file to this path.
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -z "${KNOWN_HOSTS_B64:-}" ]; then
            echo "::error::R1_SSH_KNOWN_HOSTS is unset — pin the r1 host key before retrying (capture once out-of-band, e.g. ssh root@136.243.90.96 ssh-keyscan -t ed25519 136.243.90.96 | base64 -w0, then set it as a repo secret). The live ssh-keyscan fallback was removed (F-001) — it was a MITM hole." >&2
            exit 1
          fi
          echo "$KNOWN_HOSTS_B64" | base64 -d > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Vault password
        # F-1298: the vault password + the base64 vault both flow through
        # `env:`, never interpolated into the shell. The password was a
        # shell-injection sink when inlined (a `$(...)`/backtick inside the
        # secret would have executed in the runner). Written with printf,
        # not echo, so no trailing newline is appended to the password.
        env:
          VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          VAULT_FILE_B64: ${{ secrets.ANSIBLE_VAULT_FILE_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ansible
          printf '%s' "$VAULT_PASS" > ~/.ansible/r1_vault_pass
          chmod 600 ~/.ansible/r1_vault_pass
          # The encrypted vault itself is NOT in the (public) repo —
          # 2026-07-03 exposure response. Materialize it from the
          # Actions secret.
          printf '%s' "$VAULT_FILE_B64" | base64 -d > configs/ansible/inventory/r1.secrets.yml

      - name: Dry-run the playbook against r1
        working-directory: configs/ansible
        run: |
          # pipefail so an ansible failure (invalid vault password, unreachable
          # host, task error) fails THIS step loudly. Without it, `... | tee`
          # returns tee's exit 0 under `bash -e`, masking the real error and
          # resurfacing it as a confusing empty-recap "drift detected" in the
          # next step (observed 2026-07-17: a stale ANSIBLE_VAULT_PASSWORD
          # secret produced exactly that misleading failure).
          set -o pipefail
          ansible-playbook -i inventory/r1.yml playbooks/archival-node.yml \
            --check --diff | tee /tmp/drift.out

      - name: Fail on drift
        run: |
          RECAP=$(grep -E "changed=[0-9]+" /tmp/drift.out | tail -1)
          # No recap => the dry-run never reached PLAY RECAP (the play errored).
          # With pipefail above this step won't even run, but guard anyway so a
          # future regression fails with the TRUE cause, not "drift detected: <empty>".
          if [ -z "$RECAP" ]; then
            echo "::error::ansible produced no PLAY RECAP — the dry-run failed (invalid vault password, unreachable host, or a task error). See the 'Dry-run the playbook against r1' step above; this is NOT a drift signal."
            exit 1
          fi
          CHANGED=$(echo "$RECAP" | grep -oE "changed=[0-9]+" | cut -d= -f2)
          echo "recap: $RECAP"
          # A small allowance for known non-idempotent command tasks
          # (chown recurse, bucket-ensure). Anything above it = drift.
          if [ "${CHANGED:-999}" -gt 13 ]; then
            echo "::error::ansible drift detected: $CHANGED changed tasks (allowance 13). A hand fix needs codifying or repo config needs applying — see docs/operations/r1-ansible-drift-2026-07-03.md"
            exit 1
          fi
          echo "within allowance ($CHANGED <= 13)"

      - name: Shred materialized secrets
        # F-003: always remove the decoded vault + the plaintext vault
        # password from the runner — even if the dry-run failed above — so
        # neither the workspace copy of r1.secrets.yml nor the vault-pass
        # file lingers on the (shared-tenant) runner disk or gets swept into
        # any post-job artifact. `shred` overwrites first; `rm -f` is the
        # fallback if shred is unavailable / the file was never created.
        if: always()
        run: |
          shred -u ~/.ansible/r1_vault_pass 2>/dev/null || rm -f ~/.ansible/r1_vault_pass
          shred -u configs/ansible/inventory/r1.secrets.yml 2>/dev/null || rm -f configs/ansible/inventory/r1.secrets.yml
