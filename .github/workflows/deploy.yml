name: deploy

# Manual deploy of a tagged binary release to a region.
#
# Required GitHub Actions secrets:
#   DEPLOY_SSH_PRIVATE_KEY  — SSH key with root access to the
#                              region's host (`ssh-keygen -t ed25519`,
#                              public key authorised on the host)
#   R1_HOST                  — IP/hostname of the r1 box (e.g. 136.243.90.96)
#   R1_USER                  — SSH user; defaults to "root" if unset
#   R1_SSH_KNOWN_HOSTS       — `ssh-keyscan -t ed25519 <host>` output,
#                              base64-encoded (avoid newline-in-secret
#                              quirks). Pinning known_hosts prevents
#                              MITM during deploy.
#
# Triggered exclusively via workflow_dispatch. There's no auto-deploy
# on tag push — the release workflow produces the artefacts; a human
# decides when each region picks them up.
#
# Stack: depends on PRs #645 (release.yml + Dockerfiles + SemVer
# policy) which produces the v* tagged release artefacts this
# workflow downloads.

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Target region'
        required: true
        type: choice
        options:
          - r1
      version:
        description: 'Version tag to deploy (e.g. v0.2.0). Must exist as a GitHub Release.'
        required: true
        type: string
      binaries:
        # F-1314 (codex audit-2026-05-13): the default deploy set
        # now INCLUDES stellarindex-sla-probe so the active
        # /opt/stellarindex/healthchecks/sla-probe.sh wrapper +
        # stellarindex-sla-probe.timer always have a matching
        # /usr/local/bin/stellarindex-sla-probe under it. Pre-fix
        # a nominal deploy would leave the SLA-evidence binary
        # stale (or absent on a fresh host) because the timer's
        # presence on r1 came from the wave-129 ssh-side
        # operator install, not from the release/deploy flow.
        description: 'Comma-separated binaries to deploy'
        required: false
        type: string
        default: 'stellarindex-indexer,stellarindex-aggregator,stellarindex-api,stellarindex-sla-probe'
      health_grace_seconds:
        description: 'Seconds to wait between restart and /v1/healthz probe'
        required: false
        type: string
        default: '15'
      migrations_skip:
        # F-1301 (rc.51 deploy): the playbook's hardcoded passwordless
        # DSN fails auth against the live db; operators who have
        # already applied migrations out-of-band (or who know the
        # schema is unchanged from the prior tag) can skip the step.
        description: 'Skip the migration sync + apply (use ONLY when migrations are already applied or schema is unchanged)'
        required: false
        type: boolean
        default: false

# Concurrency: at most one deploy per region in flight. Prevents two
# operators racing each other and producing inconsistent state.
concurrency:
  group: deploy-${{ inputs.region }}
  cancel-in-progress: false

permissions:
  contents: read           # download release artefacts
  # F-1296 (codex audit-2026-05-13): `id-token: write` removed.
  # No step currently consumes the OIDC JWT (keyless attestation
  # is planned but not wired yet); a compromised step in this
  # deploy job shouldn't be able to mint an OIDC token. Add it
  # back in the SAME PR that wires the attestation step.

jobs:
  deploy:
    name: Deploy ${{ inputs.version }} → ${{ inputs.region }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: ${{ inputs.region }}
      # Set this in the repo's Environments → r1 → Reviewers list to
      # require manual approval before this job runs in r1. Leave
      # empty for unattended.

    steps:
      - name: Checkout (for Ansible playbook)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Validate inputs
        # F-1298 (codex audit-2026-05-13): pass inputs through
        # `env:` rather than interpolating `${{ inputs.* }}`
        # directly into the shell. Pre-fix the validation regex
        # ran AFTER the shell had already expanded the input —
        # an input like `"; cat /etc/passwd; echo "v1.0.0` would
        # execute `cat /etc/passwd` before the SemVer check
        # even fired. Env-var passing means the shell sees the
        # value as a regular string variable.
        env:
          VERSION: ${{ inputs.version }}
          BINARIES: ${{ inputs.binaries }}
        run: |
          set -euo pipefail
          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$'; then
            echo "::error::Version '$VERSION' must match SemVer vX.Y.Z[-prerelease][+build]"
            exit 1
          fi
          # Reject empty / whitespace-only binary list early
          BINS="$(echo "$BINARIES" | tr -d '[:space:]')"
          if [ -z "$BINS" ]; then
            echo "::error::binaries input is empty"
            exit 1
          fi
          # Each binary must be a known cmd/<name> directory
          IFS=',' read -ra LIST <<< "$BINS"
          for b in "${LIST[@]}"; do
            # Reject anything that's not [a-zA-Z0-9-] before
            # touching the filesystem — defends against an
            # input like `../../etc/passwd` that happened to
            # have a matching `cmd/` directory.
            if ! [[ "$b" =~ ^[a-zA-Z0-9-]+$ ]]; then
              echo "::error::Binary name '$b' contains illegal characters; only [a-zA-Z0-9-] permitted"
              exit 1
            fi
            if [ ! -d "cmd/$b" ]; then
              echo "::error::Unknown binary '$b' (no cmd/$b/ directory)"
              exit 1
            fi
          done
          echo "Validated ${#LIST[@]} binaries: ${LIST[*]}"

      - name: Resolve region inventory
        id: region
        # F-1298 (wave 126): inputs through `env:`, never
        # interpolated `${{ inputs.* }}` into the shell.
        env:
          R1_HOST: ${{ secrets.R1_HOST }}
          R1_USER: ${{ secrets.R1_USER }}
          REGION: ${{ inputs.region }}
        run: |
          set -euo pipefail
          case "$REGION" in
            r1)
              host="${R1_HOST}"
              user="${R1_USER:-root}"
              ;;
            *)
              echo "::error::Region '$REGION' has no inventory mapping"
              exit 1
              ;;
          esac
          if [ -z "$host" ]; then
            echo "::error::Region $REGION host secret is unset"
            exit 1
          fi
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"
          echo "Target: $user@$host"

      - name: Download release binaries
        # F-1298 (wave 126): inputs through `env:`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          BINARIES: ${{ inputs.binaries }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist
          IFS=',' read -ra LIST <<< "$(echo "$BINARIES" | tr -d '[:space:]')"
          for b in "${LIST[@]}"; do
            artifact="${b}-linux-amd64"
            echo "Downloading $artifact from release $VERSION"
            gh release download "$VERSION" \
              -p "$artifact" -O "dist/$artifact" \
              -R "$REPO"
            chmod +x "dist/$artifact"
          done
          echo "---"
          ls -la dist/

      - name: Verify SHA256SUMS
        # F-1298 (wave 126): inputs through `env:`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          BINARIES: ${{ inputs.binaries }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release download "$VERSION" -p SHA256SUMS -O dist/SHA256SUMS -R "$REPO"
          cd dist
          # SHA256SUMS contains every artefact's sum. Filter to the
          # binaries we downloaded and verify just those.
          IFS=',' read -ra LIST <<< "$(echo "$BINARIES" | tr -d '[:space:]')"
          for b in "${LIST[@]}"; do
            grep -E "  ${b}-linux-amd64$" SHA256SUMS | sha256sum -c -
          done
          echo "Checksums OK"

      # F-1220 (codex audit-2026-05-12): ship the migrations dir
      # alongside binaries so the playbook can sync + apply them
      # BEFORE the binary swap. Without this, a tagged deploy that
      # depends on a new schema would restart binaries onto an
      # out-of-date DB and produce partial-outage shapes that
      # /v1/healthz wouldn't catch.
      - name: Stage migrations from the release tag's tree
        # F-1298 (wave 126): inputs through `env:`.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Use `gh api` to read the migrations tree at the exact
          # tag — guarantees binary ↔ migration set parity even if
          # main has advanced since the tag.
          mkdir -p dist/migrations
          gh api "repos/$REPO/git/trees/$VERSION?recursive=1" \
            --jq '.tree[] | select(.path | startswith("migrations/")) | .path' \
            | while read -r path; do
                rel="${path#migrations/}"
                if [ -z "$rel" ]; then continue; fi
                target="dist/migrations/$rel"
                mkdir -p "$(dirname "$target")"
                gh api "repos/$REPO/contents/${path}?ref=$VERSION" \
                  --jq '.content' | base64 -d > "$target"
              done
          echo "---"
          # `| head` + pipefail interacts badly: head closes early,
          # ls hits SIGPIPE, pipefail fails the step even though
          # everything staged correctly. F-1300 (rc.51 deploy fail).
          # Print the count + the first 10 names via sort+head.
          echo "staged $(ls dist/migrations/ | wc -l) migration files"
          ls dist/migrations/ | sort | head -n 10

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS_B64: ${{ secrets.R1_SSH_KNOWN_HOSTS }}
          HOST: ${{ steps.region.outputs.host }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # F-1297 (codex audit-2026-05-13): fail fast if the
          # pinned host-key secret is missing instead of falling
          # back to live `ssh-keyscan` — the fallback was a
          # silent MITM exposure (any TCP attacker on the path
          # to the deploy host could have served a forged host
          # key and the workflow would have trusted it for the
          # entire deploy session). Operators must populate
          # `<REGION>_SSH_KNOWN_HOSTS` from a trusted out-of-band
          # capture before the first deploy of each region.
          if [ -z "${KNOWN_HOSTS_B64:-}" ]; then
            echo "::error::${REGION:-R1}_SSH_KNOWN_HOSTS is unset. Capture once via `ssh root@<host> 'ssh-keyscan -t ed25519 <host>' | base64 -w0` and set it as a repo secret before retrying. Live ssh-keyscan fallback was removed in wave 126 (F-1297) — it was a MITM hole." >&2
            exit 1
          fi
          echo "$KNOWN_HOSTS_B64" | base64 -d > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install Ansible
        # F-1299 (codex audit-2026-05-13): EXACT pins for both
        # ansible-core and pip itself. Pre-fix `'ansible-core==2.18.*'`
        # let any 2.18.x patch land at deploy time, including future
        # 2.18.999. The requirements.yml file is also now exact-pinned.
        # Bumps are a deliberate three-file edit: this pin, the
        # requirements.yml pin, and a deploy-replay confirmation.
        run: |
          python3 -m pip install 'pip==24.3.1'
          python3 -m pip install 'ansible-core==2.18.4'
          # F-1220 (codex audit-2026-05-12): the deploy-binary playbook
          # uses `ansible.posix.synchronize` to stage the new binary
          # before atomic install. `ansible-core` ships only the
          # bundled collections; `ansible.posix` lives in Galaxy and
          # must be installed separately. requirements.yml is the
          # source of truth for ALL collection pins (posix,
          # community.*).
          ansible-galaxy collection install -r configs/ansible/requirements.yml

      - name: Run deploy playbook
        # F-1298 (wave 126): inputs through `env:`. Note that
        # `ansible-playbook -e "key=$VAR"` STILL needs care —
        # ansible-playbook itself parses that string. The
        # validation regex on `version` (in the Validate step
        # above) and the `[a-zA-Z0-9-]+` regex on per-binary
        # entries (also above) guarantee these values can't
        # carry shell metacharacters. health_grace_seconds is
        # type=number per the workflow_dispatch schema so
        # GitHub itself enforces the type before substitution.
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'True'
          ANSIBLE_FORCE_COLOR: '1'
          DEPLOY_HOST: ${{ steps.region.outputs.host }}
          DEPLOY_USER: ${{ steps.region.outputs.user }}
          VERSION: ${{ inputs.version }}
          BINARIES: ${{ inputs.binaries }}
          HEALTH_GRACE: ${{ inputs.health_grace_seconds }}
          MIGRATIONS_SKIP: ${{ inputs.migrations_skip }}
        run: |
          set -euo pipefail
          ansible-playbook \
            -i "${DEPLOY_HOST}," \
            -u "${DEPLOY_USER}" \
            --private-key ~/.ssh/id_deploy \
            -e "version=${VERSION}" \
            -e "binaries_csv=${BINARIES}" \
            -e "local_dist_dir=$GITHUB_WORKSPACE/dist" \
            -e "health_grace_seconds=${HEALTH_GRACE}" \
            -e "migrations_skip=${MIGRATIONS_SKIP}" \
            configs/ansible/playbooks/deploy-binary.yml

      - name: Summary
        if: always()
        # F-1298: even the summary writer goes through `env:`, not
        # `${{ inputs.* }}` interpolation. A summary string of
        # `; rm -rf .` would have been shell-expanded pre-fix.
        env:
          REGION: ${{ inputs.region }}
          VERSION: ${{ inputs.version }}
          BINARIES: ${{ inputs.binaries }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deploy summary"
            echo ""
            echo "- Region: \`${REGION}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Binaries: \`${BINARIES}\`"
            echo "- Outcome: \`${JOB_STATUS}\`"
          } >> "$GITHUB_STEP_SUMMARY"
